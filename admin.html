<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RACIM ADMIN 🛡️</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #1e293b; color: white; }
        .btn-reset { background: #f59e0b; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-reset:hover { background: #d97706; }
    </style>
</head>
<body>

    <h1 style="color:#1e293b;">🛡️ Administration RACIM SHOP</h1>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Utilisateur</th>
                    <th>Username</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="admin-table"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('users').on('value', snap => {
            const tbody = document.getElementById('admin-table');
            tbody.innerHTML = '';
            snap.forEach(child => {
                const u = child.val();
                tbody.innerHTML += `
                    <tr>
                        <td><b>${u.name || 'Nouveau'}</b></td>
                        <td style="color:blue">${u.username || '@--'}</td>
                        <td>
                            <button class="btn-reset" onclick="resetUser('${child.key}')">Forcer Re-Inscription</button>
                        </td>
                    </tr>
                `;
            });
        });

        function resetUser(id) {
            if(confirm("إجبار المستخدم على إعادة إدخال معلوماته؟")) {
                db.ref('users/' + id).remove().then(() => alert("C'est fait !"));
            }
        }
    </script>
</body>
</html>
