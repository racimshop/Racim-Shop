<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم رسيم - الرفع المجاني</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        #status { color: blue; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h2>📦 إضافة منتج (رفع مباشر)</h2>
    <input type="text" id="p-name" placeholder="اسم المنتج">
    <input type="number" id="p-price" placeholder="السعر (DA)">
    <p style="text-align: right; font-size: 12px; margin-bottom: 5px;">اختر صورة المنتج:</p>
    <input type="file" id="p-file" accept="image/*">
    <button onclick="uploadAndAdd()">إضافة للمتجر 🚀</button>
    <div id="status"></div>
</div>

<script>
    // Config Firebase تاعك
    const firebaseConfig = {
        apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs",
        databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function uploadAndAdd() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const fileInput = document.getElementById('p-file');
        const status = document.getElementById('status');

        if(!name || !price || !fileInput.files[0]) {
            alert("عمر كلش يا رسيم!");
            return;
        }

        status.innerText = "جاري رفع الصورة... انتظر قليلًا ⏳";

        // الرفع لموقع ImgBB (مجاني وبدون حساب معقد)
        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        try {
            // استعملت Key تجريبي (تقدر تخدم بيه عادي)
            const response = await fetch("https://api.imgbb.com/1/upload?key=6df707297960710609a6390176846175", {
                method: "POST",
                body: formData
            });
            const data = await response.json();
            const imageUrl = data.data.url;

            // بعد ما نجيبو رابط الصورة، نخبوه في Firebase
            await db.ref('products').push({
                name: name,
                price: price,
                img: imageUrl
            });

            status.innerText = "تمت الإضافة بنجاح! ✅";
            alert("مبروك! السلعة راهي في السيت.");
            location.reload();

        } catch (error) {
            console.error(error);
            status.innerText = "حدث خطأ في الرفع ❌";
        }
    }
</script>

</body>
</html>
