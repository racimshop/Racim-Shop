<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Racim Shop | Boss Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #10b981; --dark: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Login Box */
        #login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 100px auto; text-align: center; }
        
        /* Admin Panel Items */
        #admin-content { display: none; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; color: var(--dark); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
        th { background: #f8fafc; }
        
        .p-img { width: 50px; height: 50px; object-fit: contain; }
        .btn-del { background: var(--danger); width: auto; padding: 5px 10px; font-size: 12px; }
        .btn-edit { background: #f59e0b; width: auto; padding: 5px 10px; font-size: 12px; margin-left: 5px; }
        .status-badge { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-box">
        <h2>🔐 دخول الإدارة</h2>
        <input type="text" id="user-in" placeholder="اسم المستخدم">
        <input type="password" id="pass-in" placeholder="كلمة السر">
        <button onclick="checkAdmin()">دخول</button>
        <p id="err" style="color:red; display:none;">المعلومات غلط يا رسيم!</p>
    </div>

    <div id="admin-content">
        <h1 style="text-align:center;">مرحباً يا Boss رسيم! 😎</h1>

        <div class="card" style="border: 2px solid var(--success);">
            <h2>🛍️ طلبيات الزبائن (Commandes)</h2>
            <table>
                <thead>
                    <tr>
                        <th>الزبون</th>
                        <th>المنتجات</th>
                        <th>المجموع</th>
                        <th>التاريخ</th>
                        <th>التحكم</th>
                    </tr>
                </thead>
                <tbody id="orders-list"></tbody>
            </table>
        </div>

        <div class="card">
            <h2>📦 إضافة منتج جديد</h2>
            <input type="text" id="p-name" placeholder="اسم المنتج">
            <input type="number" id="p-price" placeholder="السعر (DA)">
            <input type="file" id="p-file" accept="image/*">
            <button onclick="uploadAndAdd()">رفع وإضافة للمتجر 🚀</button>
            <p id="status" style="color:blue;"></p>
        </div>

        <div class="card">
            <h2>🛒 قائمة السلعة الحالية</h2>
            <table>
                <thead>
                    <tr>
                        <th>الصورة</th>
                        <th>الاسم</th>
                        <th>السعر</th>
                        <th>التحكم</th>
                    </tr>
                </thead>
                <tbody id="products-list"></tbody>
            </table>
        </div>

        <div class="card">
            <h2>👥 الزبائن المسجلين</h2>
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الإيميل</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="users-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs",
        databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // معلوماتك يا رسيم
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "racim123";

    function checkAdmin() {
        const u = document.getElementById('user-in').value;
        const p = document.getElementById('pass-in').value;
        if(u === ADMIN_USER && p === ADMIN_PASS) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadAllData();
        } else {
            document.getElementById('err').style.display = 'block';
        }
    }

    function loadAllData() {
        loadProducts();
        loadOrders();
        loadUsers();
    }

    // رفع وإضافة السلعة
    async function uploadAndAdd() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const file = document.getElementById('p-file').files[0];
        if(!name || !price || !file) return alert("عمر كلش!");

        document.getElementById('status').innerText = "جاري الرفع... ⏳";
        const formData = new FormData();
        formData.append("image", file);

        try {
            const res = await fetch("https://api.imgbb.com/1/upload?key=6df707297960710609a6390176846175", {
                method: "POST", body: formData
            });
            const data = await res.json();
            await db.ref('products').push({ name, price, img: data.data.url });
            alert("تمت الإضافة!");
            location.reload();
        } catch (e) { alert("خطأ في الرفع"); }
    }

    // جلب السلع
    function loadProducts() {
        db.ref('products').on('value', snap => {
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const p = child.val();
                list.innerHTML += `<tr>
                    <td><img src="${p.img}" class="p-img"></td>
                    <td>${p.name}</td>
                    <td>${p.price} DA</td>
                    <td>
                        <button class="btn-edit" onclick="editP('${child.key}','${p.name}','${p.price}')">تعديل</button>
                        <button class="btn-del" onclick="delP('${child.key}')">حذف</button>
                    </td>
                </tr>`;
            });
        });
    }

    // جلب الطلبيات
    function loadOrders() {
        db.ref('orders').on('value', snap => {
            const list = document.getElementById('orders-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const o = child.val();
                let items = o.items.map(i => i.name).join(', ');
                list.innerHTML += `<tr>
                    <td><b>${o.customer}</b></td>
                    <td>${items}</td>
                    <td style="color:green;">${o.total} DA</td>
                    <td>${o.date}</td>
                    <td><button class="btn-del" onclick="delOrder('${child.key}')">تم ✅</button></td>
                </tr>`;
            });
        });
    }

    // جلب الزبائن
    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const u = child.val();
                list.innerHTML += `<tr>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td><span class="status-badge">Valide</span></td>
                </tr>`;
            });
        });
    }

    function delP(k) { if(confirm("تمسح السلعة؟")) db.ref('products/'+k).remove(); }
    function delOrder(k) { if(confirm("وصلت الطلبية؟")) db.ref('orders/'+k).remove(); }
    function editP(k, n, p) {
        const nn = prompt("الاسم الجديد:", n);
        const np = prompt("السعر الجديد:", p);
        if(nn && np) db.ref('products/'+k).update({ name: nn, price: np });
    }
</script>
</body>
</html>
