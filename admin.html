<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACIM SHOP | Admin 🛡️</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --dark: #0f172a; --blue: #2563eb; --red: #ef4444; }
        body { font-family: sans-serif; background: #f8fafc; margin: 0; display: flex; }
        
        .sidebar { width: 220px; background: var(--dark); color: white; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-left: 220px; flex: 1; padding: 20px; }
        
        .stat-box { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block; min-width: 150px; margin-right: 15px; text-align: center; }
        .stat-box b { font-size: 20px; color: var(--blue); }

        table { width: 100%; background: white; border-collapse: collapse; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f5f9; color: #64748b; font-size: 13px; }
        
        .search-bar { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-del { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: #fbbf24;">RACIM SHOP</h2>
    <p>Admin Panel</p>
    <hr style="border:0.5px solid #334155;">
    <p>👥 Utilisateurs</p>
    <a href="index.html" style="color:white; text-decoration:none;">🏠 Retour au Site</a>
</div>

<div class="main">
    <h1>Tableau de Bord</h1>
    
    <div class="stats">
        <div class="stat-box"><h3>Users</h3><b id="total-users">0</b></div>
        <div class="stat-box"><h3>Produits</h3><b id="total-prods">0</b></div>
    </div>

    <br><br>
    <input type="text" id="adminSearch" class="search-bar" placeholder="Chercher un utilisateur..." oninput="filterAdmin()">

    <table>
        <thead>
            <tr>
                <th>Nom</th>
                <th>Username</th>
                <th>Wilaya</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="admin-table-body"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadAdmin() {
        // حساب وجلب المستخدمين
        db.ref('users').on('value', snap => {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            let count = 0;
            snap.forEach(child => {
                const u = child.val();
                count++;
                tbody.innerHTML += `
                    <tr class="user-row">
                        <td><b>${u.name || 'Inconnu'}</b></td>
                        <td style="color:var(--blue)">${u.username || '@--'}</td>
                        <td>${u.wilaya || '/'}</td>
                        <td><button class="btn-del" onclick="deleteUser('${child.key}')">Supprimer</button></td>
                    </tr>
                `;
            });
            document.getElementById('total-users').innerText = count;
        });

        // حساب المنتجات
        db.ref('products').on('value', snap => {
            document.getElementById('total-prods').innerText = snap.numChildren();
        });
    }

    function filterAdmin() {
        const val = document.getElementById('adminSearch').value.toLowerCase();
        document.querySelectorAll('.user-row').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    }

    function deleteUser(id) {
        if(confirm("Supprimer cet utilisateur ?")) {
            db.ref('users/' + id).remove();
        }
    }

    loadAdmin();
</script>
</body>
</html>
