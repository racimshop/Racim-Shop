<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACIM SHOP | Admin Panel 🛡️</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --danger: #ef4444; --primary: #2563eb; --dark: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: var(--dark); color: white; height: 100vh; position: sticky; top: 0; padding: 20px; }
        .sidebar h2 { color: #fbbf24; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .menu-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .menu-item:hover { background: #334155; }
        .active { background: var(--primary) !important; }

        /* Main Content */
        .main { flex: 1; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { margin: 0; color: #64748b; font-size: 14px; }
        .stat-card p { font-size: 28px; font-weight: bold; margin: 10px 0; color: var(--dark); }

        /* Search Bar */
        .admin-search { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 20px; font-size: 16px; }

        /* Tables */
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #64748b; }
        .user-img { width: 35px; height: 35px; border-radius: 50%; vertical-align: middle; margin-right: 10px; }
        
        .btn-del { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-user { background: #dcfce7; color: #166534; }
        .badge-admin { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>RACIM Admin</h2>
    <div class="menu-item active" onclick="switchTab('users')">👥 Utilisateurs</div>
    <div class="menu-item" onclick="switchTab('products')">🛒 Produits Mall</div>
    <div class="menu-item" onclick="switchTab('local')">📍 Local Market</div>
    <hr style="border: 0.5px solid #334155; margin: 20px 0;">
    <div class="menu-item" style="color: #ef4444;" onclick="window.location.href='index.html'">↩️ Retour au Site</div>
</div>

<div class="main">
    <div class="stats-grid">
        <div class="stat-card"><h3>Total Utilisateurs</h3><p id="s-users">0</p></div>
        <div class="stat-card"><h3>Produits Mall</h3><p id="s-products">0</p></div>
        <div class="stat-card"><h3>Annonces Locales</h3><p id="s-local">0</p></div>
    </div>

    <input type="text" class="admin-search" id="adminSearch" placeholder="Rechercher un utilisateur (Nom, @Username, Wilaya...)" oninput="filterAdmin()">

    <div id="users-section">
        <h3>قائمة المستخدمين</h3>
        <table>
            <thead>
                <tr>
                    <th>Utilisateur</th>
                    <th>Username</th>
                    <th>Wilaya</th>
                    <th>Rôle</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="users-table"></tbody>
        </table>
    </div>

    <div id="products-section" style="display:none;">
        <h3>إدارة المنتجات</h3>
        <div id="admin-products-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;"></div>
    </div>
</div>

<script>
    // Config Firebase
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // جلب البيانات وتحديث الإحصائيات
    function loadData() {
        // 1. المستخدمين
        db.ref('users').on('value', snap => {
            const table = document.getElementById('users-table');
            table.innerHTML = '';
            let count = 0;
            snap.forEach(child => {
                const u = child.val();
                const key = child.key;
                count++;
                table.innerHTML += `
                    <tr class="admin-row">
                        <td><img src="${u.avatar}" class="user-img"><b>${u.name}</b></td>
                        <td>${u.username}</td>
                        <td>${u.wilaya}</td>
                        <td><span class="badge ${u.role==='admin'?'badge-admin':'badge-user'}">${u.role || 'user'}</span></td>
                        <td><button class="btn-del" onclick="deleteUser('${key}')">Bannir</button></td>
                    </tr>
                `;
            });
            document.getElementById('s-users').innerText = count;
        });

        // 2. إحصائيات المنتجات
        db.ref('products').on('value', snap => {
            document.getElementById('s-products').innerText = snap.numChildren();
        });
        
        db.ref('local_market').on('value', snap => {
            document.getElementById('s-local').innerText = snap.numChildren();
        });
    }

    // فلتر البحث
    function filterAdmin() {
        const val = document.getElementById('adminSearch').value.toLowerCase();
        document.querySelectorAll('.admin-row').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    }

    // تبديل الأقسام
    function switchTab(tab) {
        document.getElementById('users-section').style.display = tab === 'users' ? 'block' : 'none';
        document.getElementById('products-section').style.display = tab === 'products' ? 'block' : 'none';
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        event.target.classList.add('active');
    }

    // وظائف الحذف
    function deleteUser(id) {
        if(confirm("تمسح هاد المستخدم نهائياً؟")) {
            db.ref('users/' + id).remove();
        }
    }

    loadData();
</script>
</body>
</html>
