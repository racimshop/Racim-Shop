<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Racim Shop | Boss Mode 😎</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --dark: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; color: var(--dark); display: flex; justify-content: space-between; }
        input, button, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); width: auto; padding: 5px 15px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #f8fafc; }
        .p-img { width: 50px; height: 50px; object-fit: contain; }
        .status-pending { color: var(--warning); font-weight: bold; }
        #login-box { max-width: 350px; margin: 100px auto; text-align: center; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; cursor: pointer; background: #ddd; border: none; border-radius: 5px; }
        .tab-btn.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-box" class="card">
        <h2>🔐 دخول الإدارة</h2>
        <input type="password" id="admin-pass" placeholder="كلمة السر">
        <button onclick="checkAdmin()">دخول</button>
    </div>

    <div id="admin-content" style="display:none;">
        <h1 style="text-align:center;">لوحة تحكم Racim Marketplace 👑</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="showSection('products-sec', this)">📦 السلع والستوك</button>
            <button class="tab-btn" onclick="showSection('vendors-sec', this)">🏪 إدارة البائعين</button>
            <button class="tab-btn" onclick="showSection('orders-sec', this)">🛍️ الطلبيات</button>
        </div>

        <div id="products-sec" class="section">
            <div class="card">
                <h2>إضافة منتج جديد</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="p-name" placeholder="اسم المنتج">
                    <input type="number" id="p-price" placeholder="السعر">
                    <select id="p-cat">
                        <option value="smartphone">هواتف</option>
                        <option value="clothing">ملابس</option>
                        <option value="shoes">أحذية</option>
                        <option value="electro">كهرومنزلي</option>
                    </select>
                    <input type="file" id="p-file" accept="image/*">
                </div>
                <button class="btn-success" onclick="uploadProduct()">نشر في المتجر 🚀</button>
            </div>

            <div class="card">
                <h2>قائمة السلع</h2>
                <table>
                    <thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>التحكم</th></tr></thead>
                    <tbody id="products-list"></tbody>
                </table>
            </div>
        </div>

        <div id="vendors-sec" class="section" style="display:none;">
            <div class="card">
                <h2>طلبات الانضمام (بائعين جدد)</h2>
                <table>
                    <thead><tr><th>المحل</th><th>البائع</th><th>الولاية</th><th>الحالة</th><th>التحكم</th></tr></thead>
                    <tbody id="vendors-list"></tbody>
                </table>
            </div>
        </div>

        <div id="orders-sec" class="section" style="display:none;">
            <div class="card">
                <h2>آخر الطلبيات</h2>
                <table>
                    <thead><tr><th>الزبون</th><th>الولاية</th><th>المجموع</th><th>التحكم</th></tr></thead>
                    <tbody id="orders-list"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs",
        databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkAdmin() {
        if(document.getElementById('admin-pass').value === "racim123") {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadAllData();
        } else { alert("كلمة السر غلط يا رسيم!"); }
    }

    function showSection(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    }

    // 1. معالجة البائعين (قبول/حذف)
    function loadVendors() {
        db.ref('users').orderByChild('role').equalTo('vendor').on('value', snap => {
            const list = document.getElementById('vendors-list');
            list.innerHTML = '';
            snap.forEach(c => {
                const v = c.val();
                const statusHtml = v.status === 'pending' ? '<span class="status-pending">ينتظر</span>' : '✅ مقبول';
                list.innerHTML += `<tr>
                    <td>${v.shopName}</td>
                    <td>${v.name}</td>
                    <td>${v.wilaya}</td>
                    <td>${statusHtml}</td>
                    <td>
                        ${v.status === 'pending' ? `<button onclick="approveVendor('${c.key}')" class="btn-success" style="width:auto; padding:5px;">قبول</button>` : ''}
                        <button onclick="delItem('users/${c.key}')" class="btn-danger">حذف</button>
                    </td>
                </tr>`;
            });
        });
    }

    function approveVendor(id) {
        db.ref('users/' + id).update({ status: 'approved' });
        alert("تم تفعيل حساب البائع! 🏪");
    }

    // 2. معالجة المنتجات
    async function uploadProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const cat = document.getElementById('p-cat').value;
        const file = document.getElementById('p-file').files[0];
        
        if(!name || !file) return alert("عمر المعلومات!");

        // كود الرفع لـ ImgBB (مختصر للتوضيح)
        const fd = new FormData(); fd.append("image", file);
        const res = await fetch("https://api.imgbb.com/1/upload?key=6df707297960710609a6390176846175", {method:"POST", body:fd});
        const data = await res.json();

        if(data.success) {
            db.ref('products').push({ name, price, cat, img: data.data.url, shopName: "إدارة Racim" });
            alert("تمت الإضافة!");
        }
    }

    function loadProducts() {
        db.ref('products').on('value', snap => {
            const list = document.getElementById('products-list'); list.innerHTML = '';
            snap.forEach(c => {
                const p = c.val();
                list.innerHTML += `<tr>
                    <td><img src="${p.img}" class="p-img"></td>
                    <td>${p.name}</td>
                    <td>${p.price} DA</td>
                    <td><button onclick="delItem('products/${c.key}')" class="btn-danger">حذف</button></td>
                </tr>`;
            });
        });
    }

    // 3. الطلبيات
    function loadOrders() {
        db.ref('orders').on('value', snap => {
            const list = document.getElementById('orders-list'); list.innerHTML = '';
            snap.forEach(c => {
                const o = c.val();
                list.innerHTML += `<tr>
                    <td>${o.customer}</td>
                    <td>${o.wilaya}</td>
                    <td>${o.total} DA</td>
                    <td><button onclick="delItem('orders/${c.key}')" class="btn-success" style="width:auto; padding:5px;">تم الإرسال ✅</button></td>
                </tr>`;
            });
        });
    }

    function loadAllData() { loadVendors(); loadProducts(); loadOrders(); }
    function delItem(path) { if(confirm("متأكد؟")) db.ref(path).remove(); }
</script>
</body>
</html>
