<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم رسيم | Racim Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f1f5f9; margin: 0; padding: 20px; text-align: center; }
        
        /* تصميم صفحة الدخول */
        #login-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 100px auto; }
        
        /* تصميم لوحة التحكم */
        #admin-panel { display: none; max-width: 900px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { border: 1px solid #e2e8f0; padding: 15px; text-align: center; }
        th { background: #f8fafc; color: #64748b; }
        .p-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .btn-edit { background: #f59e0b; width: auto; padding: 5px 15px; margin: 2px; }
        .btn-delete { background: var(--danger); width: auto; padding: 5px 15px; margin: 2px; }
        #status { color: var(--primary); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>🔐 دخول الإدارة</h2>
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة السر">
        <button onclick="handleLogin()">دخول</button>
        <p id="login-err" style="color:red; display:none; margin-top:10px;">المعلومات غلط يا رسيم! ❌</p>
    </div>

    <div id="admin-panel">
        <div class="box">
            <h2>📦 إضافة منتج جديد</h2>
            <input type="text" id="p-name" placeholder="اسم المنتج">
            <input type="number" id="p-price" placeholder="السعر (DA)">
            <p style="text-align: right; font-size: 12px; margin-right: 5%;">اختر صورة من جهازك:</p>
            <input type="file" id="p-file" accept="image/*">
            <button onclick="uploadAndAdd()">رفع وإضافة للمتجر 🚀</button>
            <div id="status"></div>
        </div>

        <div class="box">
            <h2>🛒 تسيير المنتجات درك</h2>
            <table>
                <thead>
                    <tr>
                        <th>الصورة</th>
                        <th>المنتج</th>
                        <th>السعر</th>
                        <th>التحكم</th>
                    </tr>
                </thead>
                <tbody id="products-table"></tbody>
            </table>
        </div>
    </div>

<script>
    // Config Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs",
        databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // معلومات الدخول
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "racim123";

    // دالة الدخول
    function handleLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === ADMIN_USER && p === ADMIN_PASS) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            loadProducts(); // جلب السلع بعد الدخول
        } else {
            document.getElementById('login-err').style.display = 'block';
        }
    }

    // دالة الرفع والاضافة (ImgBB)
    async function uploadAndAdd() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const fileInput = document.getElementById('p-file');
        const status = document.getElementById('status');

        if(!name || !price || !fileInput.files[0]) return alert("عمر كلش!");

        status.innerText = "جاري الرفع... ⏳";
        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        try {
            const res = await fetch("https://api.imgbb.com/1/upload?key=6df707297960710609a6390176846175", {
                method: "POST", body: formData
            });
            const data = await res.json();
            const imageUrl = data.data.url;

            await db.ref('products').push({ name, price, img: imageUrl });
            status.innerText = "تمت الإضافة بنجاح! ✅";
            alert("تم!");
            location.reload();
        } catch (e) { status.innerText = "خطأ في الرفع ❌"; }
    }

    // دالة جلب السلع
    function loadProducts() {
        db.ref('products').on('value', (snap) => {
            const table = document.getElementById('products-table');
            table.innerHTML = '';
            snap.forEach((child) => {
                const p = child.val();
                const key = child.key;
                table.innerHTML += `
                    <tr>
                        <td><img src="${p.img}" class="p-img"></td>
                        <td>${p.name}</td>
                        <td>${p.price} DA</td>
                        <td>
                            <button class="btn-edit" onclick="editProduct('${key}','${p.name}','${p.price}')">تعديل</button>
                            <button class="btn-delete" onclick="deleteProduct('${key}')">حذف</button>
                        </td>
                    </tr>`;
            });
        });
    }

    // حذف وتعديل
    function deleteProduct(k) { if(confirm("تمسحها؟")) db.ref('products/'+k).remove(); }
    function editProduct(k, n, p) {
        const newN = prompt("الاسم الجديد:", n);
        const newP = prompt("السعر الجديد:", p);
        if(newN && newP) db.ref('products/'+k).update({ name: newN, price: newP });
    }
</script>
</body>
</html>
