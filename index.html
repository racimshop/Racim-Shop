<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racim Marketplace | Pro 🛒</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #2563eb; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; transition: 0.3s; }
        
        /* Navbar */
        nav { background: var(--dark); color: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: bold; color: #fbbf24; cursor: pointer; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--main); cursor: pointer; }

        /* Categories Bar */
        .categories { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: white; border-bottom: 1px solid #e2e8f0; scrollbar-width: none; }
        .cat-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 25px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 600; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--main); color: white; border-color: var(--main); }

        /* Sub-Categories (Smartphones) */
        .sub-cats { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #f1f5f9; }
        .sub-btn { padding: 5px 15px; border-radius: 15px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-size: 13px; }
        .sub-btn.active { background: var(--dark); color: white; }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 140px; object-fit: contain; }
        .price { color: var(--main); font-weight: bold; margin: 10px 0; }

        .hidden { display: none; }
        .rtl { direction: rtl; text-align: right; }
        .auth-card { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-primary { background: var(--main); color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Racim Shop</div>
    <div style="display:flex; gap:10px;">
        <select id="lang-select" onchange="changeLang(this.value)" style="width:auto;">
            <option value="fr">FR 🇫🇷</option>
            <option value="ar">AR 🇩🇿</option>
            <option value="en">EN 🇺🇸</option>
        </select>
        <div id="user-nav" class="hidden">
            <img src="" id="nav-avatar" class="profile-img" onclick="document.getElementById('profile-modal').style.display='flex'">
        </div>
    </div>
</nav>

<div id="auth-screen" class="auth-card">
    <h2 id="t-auth-title">Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <div id="reg-box" class="hidden"><input type="text" id="name" placeholder="Name"></div>
    <button class="btn-primary" onclick="handleAuth()" id="btn-auth">Login</button>
    <p onclick="toggleAuth()" style="color:var(--main); cursor:pointer;">No account? Register</p>
</div>

<div id="main-content" class="hidden">
    <div class="categories" id="cat-list"></div>

    <div id="sub-cat-container" class="sub-cats hidden">
        <button class="sub-btn active" id="sub-all" onclick="filterSub('all')">Tout</button>
        <button class="sub-btn" id="sub-phone" onclick="filterSub('phone')">Téléphones</button>
        <button class="sub-btn" id="sub-parts" onclick="filterSub('parts')">Pièces</button>
    </div>

    <div class="grid" id="product-grid"></div>
</div>

<div id="profile-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:2000;">
    <div style="background:white; padding:25px; border-radius:20px; text-align:center; width:300px;">
        <img src="" id="modal-avatar" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--main);">
        <p id="p-name" style="font-weight:bold;"></p>
        <button class="btn-primary" style="background:#ef4444;" onclick="auth.signOut(); location.reload();">Logout</button>
        <button class="btn-primary" style="background:#64748b; margin-top:5px;" onclick="document.getElementById('profile-modal').style.display='none'">Close</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const i18n = {
        fr: { 
            authTitle: "Connexion", login: "Se connecter", signup: "S'inscrire",
            subAll: "Tout", subPhone: "Téléphones", subParts: "Pièces",
            cats: { all: "🏠 Tout", smartphone: "📱 Smartphones", clothing: "👕 Vêtements", shoes: "👟 Chaussures", electro: "⚡ Électro" }
        },
        ar: { 
            authTitle: "تسجيل الدخول", login: "دخول", signup: "إنشاء حساب",
            subAll: "الكل", subPhone: "هواتف", subParts: "قطع غيار",
            cats: { all: "🏠 الكل", smartphone: "📱 هواتف ذكية", clothing: "👕 ملابس", shoes: "👟 أحذية", electro: "⚡ كهرومنزلي" }
        },
        en: { 
            authTitle: "Login", login: "Login", signup: "Sign Up",
            subAll: "All", subPhone: "Phones", subParts: "Spare Parts",
            cats: { all: "🏠 All", smartphone: "📱 Smartphones", clothing: "👕 Clothing", shoes: "👟 Shoes", electro: "⚡ Electronics" }
        }
    };

    let currentLang = 'fr';
    let currentCat = 'all';
    let currentSub = 'all';
    let isLoginMode = true;

    function changeLang(l) {
        currentLang = l;
        const t = i18n[l];
        document.body.classList.toggle('rtl', l === 'ar');
        document.getElementById('t-auth-title').innerText = t.authTitle;
        document.getElementById('btn-auth').innerText = isLoginMode ? t.login : t.signup;
        document.getElementById('sub-all').innerText = t.subAll;
        document.getElementById('sub-phone').innerText = t.subPhone;
        document.getElementById('sub-parts').innerText = t.subParts;
        renderCategories();
        loadProducts();
    }

    function renderCategories() {
        const catList = document.getElementById('cat-list');
        const c = i18n[currentLang].cats;
        catList.innerHTML = '';
        for (let key in c) {
            catList.innerHTML += `<button class="cat-btn ${currentCat === key ? 'active' : ''}" onclick="filterCat('${key}')">${c[key]}</button>`;
        }
    }

    function filterCat(key) {
        currentCat = key;
        currentSub = 'all'; // Reset sub-filter
        document.getElementById('sub-cat-container').classList.toggle('hidden', key !== 'smartphone');
        renderCategories();
        loadProducts();
    }

    function filterSub(sub) {
        currentSub = sub;
        document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        loadProducts();
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try {
            if(isLoginMode) await auth.signInWithEmailAndPassword(email, pass);
            else {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/' + res.user.uid).set({ name: document.getElementById('name').value, role: 'buyer', avatar: "https://cdn-icons-png.flaticon.com/512/149/149071.png" });
            }
        } catch(e) { alert(e.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const u = snap.val();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-nav').classList.remove('hidden');
                document.getElementById('nav-avatar').src = u.avatar;
                document.getElementById('modal-avatar').src = u.avatar;
                document.getElementById('p-name').innerText = u.name;
                renderCategories(); loadProducts();
            });
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
        }
    });

    function loadProducts() {
        db.ref('products').on('value', snap => {
            const grid = document.getElementById('product-grid'); grid.innerHTML = '';
            snap.forEach(c => {
                const p = c.val();
                // فلتر التصنيف الرئيسي
                if(currentCat !== 'all' && p.cat !== currentCat) return;
                // فلتر التصنيف الفرعي (للهواتف فقط)
                if(currentCat === 'smartphone' && currentSub !== 'all' && p.subCat !== currentSub) return;

                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img || 'https://via.placeholder.com/150'}">
                        <h4>${p.name}</h4>
                        <div class="price">${p.price} DA</div>
                        <small style="color:gray">${p.shopName || 'Admin'}</small>
                    </div>`;
            });
        });
    }

    function toggleAuth() { isLoginMode = !isLoginMode; document.getElementById('reg-box').classList.toggle('hidden', isLoginMode); changeLang(currentLang); }
    changeLang('fr');
</script>
</body>
</html>
