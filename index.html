
<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RACIM SHOP | Market & Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #2563eb; --messenger: #0084ff; --jumia: #f68b1e; --dark: #0f172a; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        /* Navbar */
        nav { background: var(--dark); color: white; padding: 10px 15px; position: sticky; top: 0; z-index: 1000; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .logo-text { font-size: 22px; font-weight: bold; color: #fbbf24; letter-spacing: 1px; }
        .search-box { display: flex; background: white; border-radius: 20px; padding: 6px 15px; gap: 10px; align-items: center; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 14px; color: #333; }

        /* Navigation السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { border: none; background: none; font-size: 22px; cursor: pointer; color: #64748b; text-align: center; flex: 1; }
        .nav-item.active { color: var(--main); }
        .nav-item span { display: block; font-size: 10px; font-weight: bold; margin-top: 2px; }

        /* Sections */
        .section { display: none; padding: 10px; animation: fadeIn 0.2s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Jumia Style Cards */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .p-card { background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .p-card img { width: 100%; height: 120px; object-fit: contain; }
        .p-price { color: var(--jumia); font-weight: bold; }

        /* Messenger List */
        .chat-item { background: white; padding: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 12px; border-radius: 12px; }
        .chat-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }

        /* Auth */
        .auth-card { max-width: 400px; margin: 30px auto; background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; }
        .btn-primary { background: var(--main); color: white; border: none; font-weight: bold; cursor: pointer; }

        .hidden { display: none !important; }
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

<nav>
    <div class="nav-top">
        <span class="logo-text">RACIM SHOP</span>
        <select id="lang-select" onchange="changeLang(this.value)" style="width:auto; background:none; border:none; color:white; font-size:12px;">
            <option value="fr">FR 🇫🇷</option>
            <option value="ar">AR 🇩🇿</option>
        </select>
    </div>
    <div class="search-box">
        <span>🔍</span>
        <input type="text" id="main-search" placeholder="Chercher produits, @username..." oninput="search()">
    </div>
</nav>

<div id="auth-screen" class="auth-card">
    <h2 id="t-auth-title">Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <div id="register-fields" class="hidden">
        <input type="text" id="reg-name" placeholder="Nom Complet">
        <input type="text" id="reg-user" placeholder="Username (@racim_10)">
        <input type="tel" id="reg-phone" placeholder="Numéro de Téléphone">
        <select id="reg-wilaya"></select> </div>
    <button class="btn-primary" onclick="handleAuth()">Continuer</button>
    <p onclick="toggleAuth()" id="t-toggle" style="color:var(--main); cursor:pointer; font-size:13px; margin-top:10px;">Créer un compte</p>
</div>

<div id="app-content" class="hidden">
    
    <div id="tab-jumia" class="section active">
        <h3 style="color:var(--jumia); border-left: 4px solid var(--jumia); padding-left:10px;">🧡 Mall Officiel</h3>
        <div class="product-grid" id="jumia-list"></div>
    </div>

    <div id="tab-local" class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3>📍 Local Market</h3>
            <select id="local-city-filter" style="width:auto; padding:5px; border-radius:8px;" onchange="loadLocal()"></select>
        </div>
        <div id="local-list"></div>
    </div>

    <div id="tab-messenger" class="section">
        <h3>💬 Messenger</h3>
        <div id="chat-list">
            <p style="text-align:center; color:gray; margin-top:20px;">Pas de messages pour le moment.</p>
        </div>
    </div>

    <div id="tab-social" class="section">
        <h3>👥 Social</h3>
        <input type="text" id="user-search" placeholder="Chercher par @username ou Tel">
        <button class="btn-primary" onclick="findUser()">Chercher</button>
        <div id="social-results" style="margin-top:15px;"></div>
    </div>

    <div id="tab-profile" class="section">
        <div style="text-align:center; background:white; padding:20px; border-radius:20px;">
            <img id="my-avatar" src="" style="width:90px; height:90px; border-radius:50%; border:3px solid var(--main); object-fit:cover;">
            <h2 id="my-name" style="margin:10px 0 2px;"></h2>
            <p id="my-username" style="color:var(--main); margin:0;"></p>
            <p id="my-wilaya" style="color:gray; font-size:12px;"></p>
            <button onclick="logout()" style="background:#ef4444; color:white; border:none; margin-top:15px; padding:10px; border-radius:10px; cursor:pointer;">Déconnexion</button>
        </div>
    </div>

</div>

<div class="bottom-nav hidden" id="bottom-bar">
    <button class="nav-item active" onclick="showTab('jumia', this)">🛒<span>Shop</span></button>
    <button class="nav-item" onclick="showTab('local', this)">📍<span>Local</span></button>
    <button class="nav-item" onclick="showTab('messenger', this)">💬<span>Chat</span></button>
    <button class="nav-item" onclick="showTab('social', this)">👥<span>Social</span></button>
    <button class="nav-item" onclick="showTab('profile', this)">👤<span>Moi</span></button>
</div>

<script>
    // --- Config Firebase ---
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let isLogin = true;
    let currentUserData = null;

    // --- قائمة الولايات كاملة (1-69) ---
    const allWilayas = [
        "01-Adrar", "02-Chlef", "03-Laghouat", "04-Oum El Bouaghi", "05-Batna", "06-Béjaïa", "07-Biskra", "08-Béchar", "09-Blida", "10-Bouira",
        "11-Tamanrasset", "12-Tébessa", "13-Tlemcen", "14-Tiaret", "15-Tizi Ouzou", "16-Alger", "17-Djelfa", "18-Jijel", "19-Sétif", "20-Saïda",
        "21-Skikda", "22-Sidi Bel Abbès", "23-Annaba", "24-Guelma", "25-Constantine", "26-Médéa", "27-Mostaganem", "28-M'Sila", "29-Mascara", "30-Ouargla",
        "31-Oran", "32-El Bayadh", "33-Illizi", "34-Bordj Bou Arreridj", "35-Boumerdès", "36-El Tarf", "37-Tindouf", "38-Tissemsilt", "39-El Oued", "40-Khenchela",
        "41-Souk Ahras", "42-Tipaza", "43-Mila", "44-Aïn Defla", "45-Naâma", "46-Aïn Témouchent", "47-Ghardaïa", "48-Relizane", "49-Timimoun", "50-Bordj Badji Mokhtar",
        "51-Ouled Djellal", "52-Béni Abbès", "53-In Salah", "54-In Guezzam", "55-Touggourt", "56-Djanet", "57-El M'Ghair", "58-El Meniaa"
    ];
    // إضافة ولايات إضافية إذا احتجت مستقبلاً حتى 69
    for(let i=59; i<=69; i++) { allWilayas.push(i + "-Nouvelle Wilaya"); }

    function setupWilayas() {
        const selects = [document.getElementById('reg-wilaya'), document.getElementById('local-city-filter')];
        selects.forEach(s => {
            if(!s) return;
            s.innerHTML = s.id.includes('filter') ? '<option value="">Toutes les villes</option>' : '<option value="">Choisir Wilaya</option>';
            allWilayas.forEach(w => s.innerHTML += `<option value="${w}">${w}</option>`);
        });
    }

    // --- نظام التبديل بين الأقسام ---
    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        btn.classList.add('active');
    }

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('register-fields').classList.toggle('hidden', isLogin);
        document.getElementById('t-auth-title').innerText = isLogin ? "Connexion" : "Inscription";
    }

    // --- التعامل مع الحسابات ---
    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try {
            if(isLogin) {
                await auth.signInWithEmailAndPassword(email, pass);
            } else {
                const name = document.getElementById('reg-name').value;
                const user = document.getElementById('reg-user').value;
                const phone = document.getElementById('reg-phone').value;
                const wilaya = document.getElementById('reg-wilaya').value;
                if(!name || !user || !phone || !wilaya) return alert("Remplissez tout!");
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/' + res.user.uid).set({
                    name, username: user.startsWith('@') ? user : '@'+user, phone, wilaya,
                    avatar: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    friends: 0, status: 'approved'
                });
            }
        } catch(e) { alert(e.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                currentUserData = snap.val();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('bottom-bar').classList.remove('hidden');
                document.getElementById('my-name').innerText = currentUserData.name;
                document.getElementById('my-username').innerText = currentUserData.username;
                document.getElementById('my-avatar').src = currentUserData.avatar;
                document.getElementById('my-wilaya').innerText = "📍 " + currentUserData.wilaya;
                loadJumia(); loadLocal();
            });
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('bottom-bar').classList.add('hidden');
        }
    });

    function loadJumia() {
        db.ref('products').on('value', snap => {
            const list = document.getElementById('jumia-list'); list.innerHTML = '';
            snap.forEach(c => {
                const p = c.val();
                list.innerHTML += `<div class="p-card"><img src="${p.img}"><h4>${p.name}</h4><div class="p-price">${p.price} DA</div></div>`;
            });
        });
    }

    function loadLocal() {
        const city = document.getElementById('local-city-filter').value;
        db.ref('local_market').on('value', snap => {
            const list = document.getElementById('local-list'); list.innerHTML = '';
            snap.forEach(c => {
                const ad = c.val();
                if(city === "" || ad.city === city) {
                    list.innerHTML += `<div class="chat-item">
                        <img src="${ad.img}" class="chat-img">
                        <div style="flex:1"><b>${ad.title}</b><br><small>📍 ${ad.city}</small></div>
                        <b style="color:var(--main)">${ad.price} DA</b>
                    </div>`;
                }
            });
        });
    }

    function logout() { auth.signOut(); location.reload(); }
    function changeLang(l) { document.body.classList.toggle('rtl', l === 'ar'); }
    
    setupWilayas();
</script>
</body>
</html>
