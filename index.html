
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racim Shop | المتجر الرسمي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --dark: #0f172a; --blue: #2563eb; --green: #10b981; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; text-align: center; }
        nav { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; color: #f59e0b; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .hidden { display: none !important; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 150px; object-fit: contain; }
        .price { color: var(--blue); font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Racim Shop 🛒</div>
    <div id="nav-info" class="hidden">
        <button onclick="logout()" style="background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:8px;">خروج</button>
    </div>
</nav>

<div id="auth-section">
    <div id="login-box" class="container">
        <h2>تسجيل الدخول</h2>
        <input type="email" id="l-email" placeholder="البريد الإلكتروني">
        <input type="password" id="l-pass" placeholder="كلمة السر">
        <button class="btn btn-blue" onclick="signIn()">دخول للمتجر</button>
        <p>ما عندكش حساب؟ <a href="#" onclick="toggleUI(true)">سجل الآن</a></p>
    </div>

    <div id="reg-box" class="container hidden">
        <h2>إنشاء حساب</h2>
        <input type="text" id="r-name" placeholder="الاسم الكامل">
        <input type="email" id="r-email" placeholder="البريد الإلكتروني">
        <input type="password" id="r-pass" placeholder="كلمة السر">
        <button class="btn btn-green" onclick="signUp()">فتح حساب</button>
        <p>عندك حساب؟ <a href="#" onclick="toggleUI(false)">سجل دخول</a></p>
    </div>
</div>
<div id="shop-section" class="hidden">
    <h1>مرحباً بك، <span id="user-display"></span>!</h1>
    <div class="product-grid" id="p-grid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs",
        authDomain: "racimshop-60fb0.firebaseapp.com",
        projectId: "racimshop-60fb0",
        storageBucket: "racimshop-60fb0.firebasestorage.app",
        messagingSenderId: "1049057013675",
        appId: "1:1049057013675:web:b0cf22da97e39e0e4b6cee",
        databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function toggleUI(isReg) {
        document.getElementById('reg-box').classList.toggle('hidden', !isReg);
        document.getElementById('login-box').classList.toggle('hidden', isReg);
    }

    function signUp() {
        const email = document.getElementById('r-email').value;
        const pass = document.getElementById('r-pass').value;
        const name = document.getElementById('r-name').value;
        auth.createUserWithEmailAndPassword(email, pass).then(res => {
            db.ref('users/' + res.user.uid).set({
                uid: res.user.uid, name: name, email: email, role: 'user'
            }).then(() => alert("تم إنشاء الحساب بنجاح!"));
        }).catch(err => alert(err.message));
    }

    function signIn() {
        const email = document.getElementById('l-email').value;
        const pass = document.getElementById('l-pass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).once('value').then(snap => {
                const userData = snap.val();
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('shop-section').classList.remove('hidden');
                document.getElementById('nav-info').classList.remove('hidden');
                document.getElementById('user-display').innerText = userData.name;
                loadProducts();
            });
        }
    });

    // دالة تجلب السلع من Firebase وتضعها في السيت
function loadProducts() {
    const grid = document.getElementById('p-grid'); // هذا هو المكان اللي يتحط فيه السلعة
    
    // نفتحو اتصال مع قسم المنتجات في Firebase
    db.ref('products').on('value', (snapshot) => {
        grid.innerHTML = ''; // نفرغو الصفحة قبل ما نعمروها باش ما تكررش السلعة
        
        if (snapshot.exists()) {
            snapshot.forEach((childSnapshot) => {
                const product = childSnapshot.val();
                
                // هنا نصممو كيفاش تبان الكارت تاع المنتج
                grid.innerHTML += `
                    <div class="product-card" style="border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: white; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        <img src="${product.img}" alt="${product.name}" style="width: 100%; height: 150px; object-fit: contain; margin-bottom: 10px;">
                        <h3 style="font-size: 18px; margin: 10px 0;">${product.name}</h3>
                        <p style="color: #2563eb; font-weight: bold; font-size: 20px;">${product.price} DA</p>
                        <button onclick="addToCart('${product.name}')" style="background: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%;">إضافة للسلة</button>
                    </div>
                `;
            });
        } else {
            grid.innerHTML = "<p>لا توجد منتجات حالياً، انتظرنا قريباً!</p>";
        }
    });
}

// تشغيل الدالة تلقائياً عند فتح السيت
loadProducts();
</script>
</body>
</html>
