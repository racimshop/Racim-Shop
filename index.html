<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RACIM SHOP | Super App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #2563eb; --msg: #0084ff; --jumia: #f68b1e; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
        
        /* Header & Search */
        nav { background: #1c1e21; color: white; padding: 10px 15px; position: sticky; top: 0; z-index: 1000; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .search-container { display: flex; background: #3a3b3c; border-radius: 20px; padding: 5px 15px; gap: 10px; }
        .search-container input { border: none; background: none; color: white; width: 100%; outline: none; }

        /* Jumia Ads Slider (Banner) */
        .promo-banner { background: var(--jumia); color: white; padding: 15px; margin: 10px; border-radius: 15px; text-align: center; font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { border: none; background: none; font-size: 20px; cursor: pointer; color: #65676b; transition: 0.3s; }
        .nav-item.active { color: var(--main); }

        /* Chat Window Style */
        .chat-footer { display: flex; align-items: center; gap: 8px; padding: 10px; background: white; border-top: 1px solid #eee; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .chat-btn { background: #f0f2f5; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }

        /* Section Visibility */
        .page { display: none; padding: 10px; }
        .page.active { display: block; }

        /* Admin Panel Card */
        .admin-card { background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid red; }

        .btn-add { position: fixed; bottom: 85px; right: 20px; background: var(--main); color: white; width: 55px; height: 55px; border-radius: 50%; border: none; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 99; }
        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div class="nav-top">
        <b style="color: #fbbf24; font-size: 20px;">RACIM SHOP</b>
        <button id="admin-btn" class="hidden" onclick="showPage('admin')" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">Admin</button>
    </div>
    <div class="search-container">
        <span>🔍</span>
        <input type="text" id="global-search" placeholder="Chercher un ami (@username)..." oninput="liveSearch()">
    </div>
</nav>

<div id="auth-page" class="page active" style="text-align:center; padding-top:50px;">
    <div style="background:white; padding:30px; border-radius:20px; margin:0 20px;">
        <h2 id="auth-title">Connexion</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <div id="reg-box" class="hidden">
            <input type="text" id="r-name" placeholder="Nom Complet">
            <input type="text" id="r-user" placeholder="Username Unique (@)">
            <input type="text" id="r-bio" placeholder="Bio (Ex: Vendeur de phones)">
            <select id="r-wilaya"></select>
        </div>
        <button onclick="handleAuth()" style="background:var(--main); color:white; border:none; padding:12px; width:100%; border-radius:10px; margin-top:10px; font-weight:bold;">Continuer</button>
        <p onclick="toggleAuth()" style="color:var(--main); cursor:pointer; margin-top:15px;">Créer un compte</p>
    </div>
</div>

<div id="main-app" class="hidden">
    
    <div id="page-home" class="page active">
        <div class="promo-banner">🔥 OFFRES JUMIA : -50% sur les iPhones ! 🔥</div>
        <div id="product-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    </div>

    <div id="page-chat" class="page">
        <h3>💬 Discussions</h3>
        <div id="conversations-list"></div>
        <div id="chat-window" class="hidden" style="position:fixed; inset:0; background:white; z-index:2000;">
            <div style="background:var(--msg); color:white; padding:15px; display:flex; gap:10px; align-items:center;">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:20px;">←</button>
                <b id="chat-target-name">Nom</b>
            </div>
            <div id="messages-box" style="height:70vh; overflow-y:auto; padding:10px;"></div>
            <div class="chat-footer">
                <button class="chat-btn">📷</button>
                <button class="chat-btn">🎤</button>
                <input type="text" id="msg-input" placeholder="Message..." style="flex:1; border:none; background:#f0f2f5; padding:10px; border-radius:20px;">
                <button onclick="sendMsg()" style="border:none; color:var(--msg); background:none; font-weight:bold;">Envoyer</button>
            </div>
        </div>
    </div>

    <div id="page-social" class="page">
        <h3>👥 Retrouver des amis</h3>
        <div id="search-results"></div>
    </div>

    <div id="page-admin" class="page">
        <h3 style="color:red;">🛡️ Tableau de Bord Admin</h3>
        <div class="search-container" style="background:#ddd; margin-bottom:15px;">
            <input type="text" id="admin-search" placeholder="Chercher un utilisateur..." oninput="adminFilter()">
        </div>
        <div id="admin-users-list"></div>
    </div>

    <div id="page-profile" class="page">
        <div style="text-align:center;">
            <img id="p-img" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--main);">
            <h2 id="p-name" style="margin:5px 0;"></h2>
            <p id="p-user" style="color:var(--main); margin:0;"></p>
            <p id="p-bio" style="font-style:italic; color:#65676b;"></p>
            <button onclick="auth.signOut()" style="background:#ddd; border:none; padding:10px; border-radius:10px; margin-top:20px;">Déconnexion</button>
        </div>
    </div>

    <button class="btn-add" onclick="openAddProduct()">+</button>
</div>

<div id="modal-product" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:3000; display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:20px; width:90%;">
        <h3>Ajouter un produit</h3>
        <input type="text" id="pt-title" placeholder="Nom du produit">
        <input type="number" id="pt-price" placeholder="Prix (DA)">
        <input type="file" id="pt-img" accept="image/*">
        <button onclick="saveProduct()" class="btn-primary" style="background:var(--jumia); color:white; border:none; padding:10px; width:100%; border-radius:10px; font-weight:bold; margin-top:10px;">Publier</button>
        <button onclick="document.getElementById('modal-product').classList.add('hidden')" style="width:100%; background:none; border:none; margin-top:10px;">Annuler</button>
    </div>
</div>

<div class="bottom-nav hidden" id="navbar">
    <button class="nav-item active" onclick="showPage('home', this)">🏠</button>
    <button class="nav-item" onclick="showPage('social', this)">👥</button>
    <button class="nav-item" onclick="showPage('chat', this)">💬</button>
    <button class="nav-item" onclick="showPage('profile', this)">👤</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let isLogin = true;
    const wilayas = ["16-Alger", "22-Sidi Bel Abbès", "31-Oran"]; // ... كملهم لـ 58
    wilayas.forEach(w => document.getElementById('r-wilaya').innerHTML += `<option value="${w}">${w}</option>`);

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        if(btn) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
        }
    }

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('reg-box').classList.toggle('hidden', isLogin);
        document.getElementById('auth-title').innerText = isLogin ? "Connexion" : "Inscription";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
        if(isLogin) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        } else {
            const user = document.getElementById('r-user').value.trim();
            const snap = await db.ref('users').orderByChild('username').equalTo(user).once('value');
            if(snap.exists()) return alert("Username déjà pris!");

            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await db.ref('users/' + res.user.uid).set({
                name: document.getElementById('r-name').value,
                username: user.startsWith('@') ? user : '@'+user,
                bio: document.getElementById('r-bio').value,
                wilaya: document.getElementById('r-wilaya').value,
                avatar: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                role: (email === "admin@racim.com") ? "admin" : "user" // حدد إيميل الأدمن هنا
            });
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const u = snap.val();
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('p-name').innerText = u.name;
                document.getElementById('p-user').innerText = u.username;
                document.getElementById('p-bio').innerText = u.bio;
                document.getElementById('p-img').src = u.avatar;
                if(u.role === "admin") {
                    document.getElementById('admin-btn').classList.remove('hidden');
                    loadAdminPanel();
                }
                loadProducts();
            });
        } else {
            location.reload();
        }
    });

    // --- Admin Search ---
    function loadAdminPanel() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('admin-users-list'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val();
                list.innerHTML += `<div class="admin-card">
                    <b>${u.name} (${u.username})</b><br><small>${u.wilaya}</small>
                </div>`;
            });
        });
    }

    function adminFilter() {
        const val = document.getElementById('admin-search').value.toLowerCase();
        document.querySelectorAll('.admin-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    // --- Products ---
    function openAddProduct() { document.getElementById('modal-product').classList.remove('hidden'); }

    async function saveProduct() {
        const file = document.getElementById('pt-img').files[0];
        const formData = new FormData(); formData.append("image", file);
        const res = await fetch("https://api.imgbb.com/1/upload?key=6df707297960710609a6390176846175", {method:"POST", body:formData});
        const d = await res.json();
        
        await db.ref('products').push({
            title: document.getElementById('pt-title').value,
            price: document.getElementById('pt-price').value,
            img: d.data.url,
            owner: auth.currentUser.uid
        });
        document.getElementById('modal-product').classList.add('hidden');
    }

    function loadProducts() {
        db.ref('products').on('value', snap => {
            const list = document.getElementById('product-list'); list.innerHTML = '';
            snap.forEach(c => {
                const p = c.val();
                list.innerHTML += `<div style="background:white; padding:10px; border-radius:10px;">
                    <img src="${p.img}" style="width:100%; height:100px; object-fit:contain;">
                    <h4>${p.title}</h4><b style="color:var(--jumia)">${p.price} DA</b>
                </div>`;
            });
        });
    }

    function liveSearch() {
        const val = document.getElementById('global-search').value;
        if(val.startsWith('@')) {
            showPage('social');
            db.ref('users').orderByChild('username').startAt(val).endAt(val+"\uf8ff").once('value', snap => {
                const res = document.getElementById('search-results'); res.innerHTML = '';
                snap.forEach(c => {
                    const u = c.val();
                    res.innerHTML += `<div class="admin-card">
                        <b>${u.name}</b> (${u.username}) <button onclick="addFriend('${c.key}')" style="float:right;">Ajouter</button>
                    </div>`;
                });
            });
        }
    }
</script>
</body>
</html>
