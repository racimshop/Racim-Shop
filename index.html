<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Racim Super App | Market & Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #2563eb; --messenger: #0084ff; --jumia: #f68b1e; --dark: #0f172a; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        /* Navbar & Header */
        nav { background: var(--dark); color: white; padding: 10px 15px; position: sticky; top: 0; z-index: 1000; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .search-box { display: flex; background: white; border-radius: 20px; padding: 6px 15px; gap: 10px; align-items: center; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 14px; }

        /* Navigation السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { border: none; background: none; font-size: 22px; cursor: pointer; color: #64748b; text-align: center; flex: 1; }
        .nav-item.active { color: var(--main); }
        .nav-item span { display: block; font-size: 10px; font-weight: bold; margin-top: 2px; }

        /* Sections */
        .section { display: none; padding: 10px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Messenger Style */
        .chat-item { background: white; padding: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 12px; border-radius: 10px; }
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .online-dot { width: 12px; height: 12px; background: #22c55e; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 0; right: 0; }

        /* Product Cards (Jumia Style) */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .p-card { background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .p-card img { width: 100%; height: 130px; object-fit: contain; }
        .p-price { color: var(--jumia); font-weight: bold; font-size: 16px; }

        /* Floating Button */
        .fab { position: fixed; bottom: 85px; right: 20px; width: 55px; height: 55px; background: var(--main); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: none; cursor: pointer; }

        /* Forms & Modals */
        .auth-card { max-width: 400px; margin: 50px auto; background: white; padding: 25px; border-radius: 20px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .hidden { display: none !important; }
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

<nav>
    <div class="nav-top">
        <b style="font-size: 18px; color: #fbbf24;">Racim SuperApp</b>
        <select id="lang-select" onchange="changeLang(this.value)" style="width: auto; background: none; color: white; border: none;">
            <option value="fr">FR 🇫🇷</option>
            <option value="ar">AR 🇩🇿</option>
        </select>
    </div>
    <div class="search-box">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="Produits, amis, @username..." oninput="globalSearch()">
    </div>
</nav>

<div id="auth-screen" class="auth-card">
    <h2 id="t-auth-title">Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <div id="register-fields" class="hidden">
        <input type="text" id="reg-name" placeholder="Nom Complet">
        <input type="text" id="reg-user" placeholder="Username (@racim_10)">
        <input type="tel" id="reg-phone" placeholder="Numéro de Téléphone">
        <select id="reg-wilaya"></select>
    </div>
    <button onclick="handleAuth()" style="background: var(--main); color:white; border:none; font-weight:bold;">Continuer</button>
    <p onclick="toggleAuth()" style="color:var(--main); cursor:pointer; font-size:13px;">Créer un compte</p>
</div>

<div id="app-content" class="hidden">
    
    <div id="tab-jumia" class="section active">
        <h3 style="color: var(--jumia);">🧡 Mall Officiel</h3>
        <div class="product-grid" id="jumia-list"></div>
    </div>

    <div id="tab-local" class="section">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>📍 Marché Local</h3>
            <select id="city-filter" onchange="loadLocal()" style="width:auto; padding:5px;"></select>
        </div>
        <div id="local-list"></div>
    </div>

    <div id="tab-messenger" class="section">
        <h3>💬 Discussions</h3>
        <div id="chat-list">
            <div class="chat-item">
                <div style="position:relative">
                    <img src="https://via.placeholder.com/50">
                    <div class="online-dot"></div>
                </div>
                <div><b>Support Racim</b><br><small>Comment يمكننا مساعدتك؟</small></div>
            </div>
        </div>
    </div>

    <div id="tab-social" class="section">
        <h3>👥 Amis & Followers</h3>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="social-search" placeholder="Chercher par @username">
            <button onclick="findFriend()" style="width:auto; background:var(--main); color:white; border:none; border-radius:10px;">🔍</button>
        </div>
        <div id="social-results"></div>
    </div>

    <div id="tab-profile" class="section">
        <div style="text-align:center; background:white; padding:20px; border-radius:20px;">
            <img id="my-avatar" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--main);">
            <h2 id="my-name" style="margin:10px 0 0;"></h2>
            <p id="my-user" style="color:var(--main); margin:0;"></p>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:15px;">
                <div><b id="count-friends">0</b><br><small>Amis</small></div>
                <div><b id="count-followers">0</b><br><small>Followers</small></div>
            </div>
            <button onclick="logout()" style="background:#ef4444; color:white; border:none; margin-top:20px;">Déconnexion</button>
        </div>
    </div>

    <button class="fab" onclick="openPostModal()">+</button>
</div>

<div class="bottom-nav hidden" id="bottom-bar">
    <button class="nav-item active" onclick="showTab('jumia', this)">🛒<span>Shop</span></button>
    <button class="nav-item" onclick="showTab('local', this)">📍<span>Local</span></button>
    <button class="nav-item" onclick="showTab('messenger', this)">💬<span>Chat</span></button>
    <button class="nav-item" onclick="showTab('social', this)">👥<span>Social</span></button>
    <button class="nav-item" onclick="showTab('profile', this)">👤<span>Moi</span></button>
</div>

<script>
    // --- Configuration Firebase ---
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let isLogin = true;
    let currentUser = null;

    // --- الولايات ---
    const wilayas = ["16-Alger", "31-Oran", "22-Sidi Bel Abbès", "25-Constantine", "06-Béjaïa"];
    wilayas.forEach(w => {
        document.getElementById('reg-wilaya').innerHTML += `<option value="${w}">${w}</option>`;
        document.getElementById('city-filter').innerHTML += `<option value="${w}">${w}</option>`;
    });

    // --- نظام التنقل ---
    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        btn.classList.add('active');
    }

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('register-fields').classList.toggle('hidden', isLogin);
        document.getElementById('t-auth-title').innerText = isLogin ? "Connexion" : "Inscription";
    }

    // --- الحسابات ---
    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try {
            if(isLogin) {
                await auth.signInWithEmailAndPassword(email, pass);
            } else {
                const name = document.getElementById('reg-name').value;
                const user = document.getElementById('reg-user').value;
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/' + res.user.uid).set({
                    name, username: user.startsWith('@') ? user : '@'+user,
                    phone: document.getElementById('reg-phone').value,
                    wilaya: document.getElementById('reg-wilaya').value,
                    avatar: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    friends: 0, followers: 0, status: 'approved'
                });
            }
        } catch(e) { alert(e.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                currentUser = snap.val();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('bottom-bar').classList.remove('hidden');
                document.getElementById('my-name').innerText = currentUser.name;
                document.getElementById('my-user').innerText = currentUser.username;
                document.getElementById('my-avatar').src = currentUser.avatar;
                loadJumia(); loadLocal();
            });
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('bottom-bar').classList.add('hidden');
        }
    });

    // --- تحميل المنتجات (Jumia Style) ---
    function loadJumia() {
        db.ref('products').on('value', snap => {
            const list = document.getElementById('jumia-list'); list.innerHTML = '';
            snap.forEach(c => {
                const p = c.val();
                list.innerHTML += `<div class="p-card"><img src="${p.img}"><h4>${p.name}</h4><div class="p-price">${p.price} DA</div></div>`;
            });
        });
    }

    // --- تحميل الإعلانات المحلية (Ouedkniss Style) ---
    function loadLocal() {
        const city = document.getElementById('city-filter').value;
        db.ref('local_market').on('value', snap => {
            const list = document.getElementById('local-list'); list.innerHTML = '';
            snap.forEach(c => {
                const ad = c.val();
                if(ad.city === city || city === "") {
                    list.innerHTML += `<div class="chat-item" style="background:white; margin-bottom:10px;">
                        <img src="${ad.img}" style="border-radius:10px;">
                        <div style="flex:1"><b>${ad.title}</b><br><small>📍 ${ad.city}</small><br><b style="color:var(--main)">${ad.price} DA</b></div>
                        <button onclick="sendDirectMsg('${ad.userId}')" style="width:auto; background:var(--messenger); color:white; border:none; padding:5px 10px; border-radius:5px;">Chat</button>
                    </div>`;
                }
            });
        });
    }

    function logout() { auth.signOut(); location.reload(); }
    function changeLang(l) { document.body.classList.toggle('rtl', l === 'ar'); }
</script>
</body>
</html>
