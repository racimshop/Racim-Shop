<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACIM SHOP</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #2563eb; --jumia: #f68b1e; --dark: #1e293b; }
        body { font-family: sans-serif; background: #f1f5f9; margin: 0; padding-bottom: 60px; }
        .hidden { display: none !important; }
        nav { background: var(--dark); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: var(--main); color: white; border: none; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #64748b; }
        .nav-item.active { color: var(--main); font-weight: bold; }
        .admin-badge { background: red; color: white; padding: 2px 5px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>

<nav>RACIM SHOP</nav>

<div id="auth-section" class="card">
    <h2 id="auth-title">Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <div id="register-only" class="hidden">
        <input type="text" id="reg-name" placeholder="Nom Complet">
        <input type="text" id="reg-user" placeholder="Username (@unique)">
        <input type="text" id="reg-bio" placeholder="Bio / Description">
        <select id="reg-wilaya"></select>
    </div>
    <button class="btn-main" onclick="handleAuth()">Continuer</button>
    <p onclick="toggleAuth()" style="text-align:center; color:var(--main); cursor:pointer;">Créer un compte</p>
</div>

<div id="app-content" class="hidden">
    <div id="tab-home" class="tab-content">
        <div style="background:var(--jumia); color:white; padding:15px; margin:10px; border-radius:10px; text-align:center;">
            📢 Bienvenue sur RACIM SHOP - Marketplace
        </div>
        <div id="product-list"></div>
    </div>

    <div id="tab-social" class="tab-content hidden">
        <div class="card">
            <input type="text" id="search-user" placeholder="Chercher un @username" oninput="searchUsers()">
            <div id="users-results"></div>
        </div>
    </div>

    <div id="tab-profile" class="tab-content hidden">
        <div class="card" style="text-align:center;">
            <h2 id="my-name"></h2>
            <p id="my-user" style="color:var(--main)"></p>
            <p id="my-bio"></p>
            <button onclick="auth.signOut()" style="background:#fecaca; color:#dc2626; border:none;">Déconnexion</button>
        </div>
    </div>
</div>

<div id="nav-bar" class="bottom-nav hidden">
    <div class="nav-item active" onclick="showTab('home', this)">🛒 Market</div>
    <div class="nav-item" onclick="showTab('social', this)">👥 Social</div>
    <div class="nav-item" onclick="showTab('profile', this)">👤 Profil</div>
</div>

<script>
    // Configuration Firebase
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let isLogin = true;

    // الولايات 1-58
    const wilayas = ["01-Adrar", "16-Alger", "22-Sidi Bel Abbès", "31-Oran"]; // كمل الباقي
    wilayas.forEach(w => document.getElementById('reg-wilaya').innerHTML += `<option value="${w}">${w}</option>`);

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('register-only').classList.toggle('hidden', isLogin);
        document.getElementById('auth-title').innerText = isLogin ? "Connexion" : "Inscription";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
        if (!email || !pass) return alert("Remplissez les champs");

        try {
            if (isLogin) {
                await auth.signInWithEmailAndPassword(email, pass);
            } else {
                const user = document.getElementById('reg-user').value.trim();
                if (!user) return alert("Username obligatoire");
                
                // التأكد من أن اليوزر فريد
                const snap = await db.ref('users').orderByChild('username').equalTo(user).once('value');
                if (snap.exists()) return alert("Username déjà pris !");

                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/' + res.user.uid).set({
                    name: document.getElementById('reg-name').value,
                    username: user.startsWith('@') ? user : '@' + user,
                    bio: document.getElementById('reg-bio').value,
                    wilaya: document.getElementById('reg-wilaya').value,
                    role: 'user'
                });
            }
        } catch (e) { alert(e.message); }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const data = snap.val();
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
                document.getElementById('my-name').innerText = data.name;
                document.getElementById('my-user').innerText = data.username;
                document.getElementById('my-bio').innerText = data.bio;
            });
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('nav-bar').classList.add('hidden');
        }
    });

    function showTab(tab, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
