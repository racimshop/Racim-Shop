<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACIM SHOP</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #2563eb; --jumia: #f68b1e; --dark: #1e293b; }
        body { font-family: sans-serif; background: #f1f5f9; margin: 0; padding-bottom: 70px; }
        .hidden { display: none !important; }
        nav { background: var(--dark); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: var(--main); color: white; border: none; font-weight: bold; cursor: pointer; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .p-card { background: white; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #eee; }
        .p-card img { width: 100%; height: 100px; object-fit: contain; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #64748b; font-size: 12px; }
        .active { color: var(--main); font-weight: bold; }
    </style>
</head>
<body>

<nav>RACIM SHOP</nav>

<div id="auth-section" class="card">
    <h2 id="auth-title" style="text-align:center;">Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Mot de passe">
    <div id="register-fields" class="hidden">
        <input type="text" id="reg-name" placeholder="Nom Complet">
        <input type="text" id="reg-user" placeholder="Username (@unique)">
        <select id="reg-wilaya"></select>
    </div>
    <button class="btn-main" onclick="handleAuth()">Continuer</button>
    <p onclick="toggleAuth()" style="text-align:center; color:var(--main); cursor:pointer;">Créer un compte</p>
</div>

<div id="app-content" class="hidden">
    <div id="tab-home" class="page">
        <div style="background:var(--jumia); color:white; padding:15px; margin:10px; border-radius:10px; text-align:center; font-weight:bold;">🔥 BIENVENUE CHEZ RACIM 🔥</div>
        <div class="product-grid" id="product-list"></div>
    </div>
    <div id="tab-profile" class="page hidden">
        <div class="card" style="text-align:center;">
            <h2 id="my-name"></h2>
            <p id="my-user" style="color:var(--main); font-weight:bold;"></p>
            <button onclick="auth.signOut()" style="background:#ef4444; color:white; border:none; margin-top:10px;">Déconnexion</button>
        </div>
    </div>
</div>

<div class="bottom-nav hidden" id="nav-bar">
    <div class="nav-item active" onclick="showTab('home', this)">🛒 Boutique</div>
    <div class="nav-item" onclick="showTab('profile', this)">👤 Profil</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let isLogin = true;
    const wilayas = ["01-Adrar", "16-Alger", "22-Sidi Bel Abbès", "31-Oran"]; // كملهم لـ 58
    wilayas.forEach(w => document.getElementById('reg-wilaya').innerHTML += `<option value="${w}">${w}</option>`);

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('register-fields').classList.toggle('hidden', isLogin);
        document.getElementById('auth-title').innerText = isLogin ? "Connexion" : "Inscription";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
        if(isLogin) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        } else {
            const user = document.getElementById('reg-user').value.trim();
            const name = document.getElementById('reg-name').value;
            if(!user || !name) return alert("Remplissez tout !");
            const snap = await db.ref('users').orderByChild('username').equalTo(user).once('value');
            if(snap.exists()) return alert("Username déjà pris !");
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await db.ref('users/' + res.user.uid).set({ name, username: user.startsWith('@') ? user : '@'+user, wilaya: document.getElementById('reg-wilaya').value });
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const u = snap.val();
                if(!u) { // إذا الآدمين مسح الداتا، نرجعوه للتسجيل
                    document.getElementById('auth-section').classList.remove('hidden');
                    document.getElementById('register-fields').classList.remove('hidden');
                    document.getElementById('app-content').classList.add('hidden');
                    document.getElementById('nav-bar').classList.add('hidden');
                    isLogin = false; document.getElementById('auth-title').innerText = "Compléter Profil";
                    return;
                }
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
                document.getElementById('my-name').innerText = u.name;
                document.getElementById('my-user').innerText = u.username;
                loadProducts();
            });
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('nav-bar').classList.add('hidden');
        }
    });

    function loadProducts() {
        db.ref('products').on('value', snap => {
            const list = document.getElementById('product-list'); list.innerHTML = '';
            snap.forEach(c => {
                const p = c.val();
                list.innerHTML += `<div class="p-card"><img src="${p.img || p.image || ''}"><h4>${p.name || p.title}</h4><b>${p.price} DA</b></div>`;
            });
        });
    }

    function showTab(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('tab-'+tab).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
