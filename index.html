
<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Racim Social Shop 🛒</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #2563eb; --dark: #0f172a; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
        
        /* Navbar & Search */
        nav { background: var(--dark); color: white; padding: 10px 15px; position: sticky; top: 0; z-index: 1000; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .search-bar { display: flex; background: white; border-radius: 20px; padding: 5px 15px; gap: 8px; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 14px; color: #333; }

        /* Tabs System */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { border: none; background: none; font-size: 20px; cursor: pointer; color: #64748b; text-align: center; }
        .nav-item.active { color: var(--main); }
        .nav-item span { display: block; font-size: 10px; font-weight: bold; }

        /* Auth Screen */
        .auth-container { max-width: 400px; margin: 40px auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; }
        .btn-main { background: var(--main); color: white; border: none; font-weight: bold; cursor: pointer; }

        /* Profile & Stats */
        .profile-header { text-align: center; padding: 20px; background: white; border-radius: 0 0 25px 25px; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .stat-box { text-align: center; font-size: 13px; }
        .stat-num { display: block; font-weight: bold; font-size: 18px; color: var(--main); }

        /* Cards */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .p-card { background: white; border-radius: 15px; padding: 10px; text-align: center; position: relative; }
        .p-card img { width: 100%; height: 120px; object-fit: contain; }

        /* Social */
        .user-row { background: white; padding: 10px 15px; margin: 5px 10px; border-radius: 15px; display: flex; align-items: center; gap: 12px; }
        .user-row img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        
        .hidden { display: none !important; }
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

<nav>
    <div class="nav-top">
        <span style="font-size: 20px; font-weight: bold; color: #fbbf24;">Racim Shop</span>
        <select id="lang-select" onchange="changeLang(this.value)" style="width: auto; padding: 2px;">
            <option value="fr">FR 🇫🇷</option>
            <option value="ar">AR 🇩🇿</option>
            <option value="en">EN 🇺🇸</option>
        </select>
    </div>
    <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="global-search" placeholder="Rechercher..." oninput="searchEverything()">
    </div>
</nav>

<div id="auth-screen" class="auth-container">
    <h2 id="t-auth-title">Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    
    <div id="reg-fields" class="hidden">
        <input type="text" id="reg-name" placeholder="Nom complet">
        <input type="text" id="reg-user" placeholder="Username (ex: @racim10)">
        <input type="tel" id="reg-phone" placeholder="N° de téléphone">
        <select id="reg-role" onchange="toggleShop()">
            <option value="buyer">Mشتري (Acheteur)</option>
            <option value="vendor">بائع (Vendeur)</option>
        </select>
        <input type="text" id="reg-shop" class="hidden" placeholder="Nom du magasin">
        <select id="reg-wilaya"></select>
    </div>

    <button class="btn-main" id="btn-auth" onclick="handleAuth()">Se connecter</button>
    <p id="t-toggle" onclick="toggleAuth()" style="color:var(--main); cursor:pointer;">Créer un compte</p>
</div>

<div id="app-content" class="hidden">
    <div id="tab-shop">
        <div id="cat-list" style="display:flex; overflow-x:auto; padding:10px; gap:8px;"></div>
        <div id="sub-cat-box" class="hidden" style="text-align:center; padding:5px;">
            <button onclick="filterSub('phone')">Phones</button> | <button onclick="filterSub('parts')">Pièces</button>
        </div>
        <div class="grid" id="product-list"></div>
    </div>

    <div id="tab-social" class="hidden">
        <div style="padding:15px;">
            <h3 id="t-add-friend">Ajouter par @Username ou Tel</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="friend-input" placeholder="@username / 06...">
                <button class="btn-main" style="width:auto;" onclick="findFriend()">➕</button>
            </div>
            <div id="search-result" class="user-row hidden">
                <img id="res-img" src="">
                <div style="flex:1">
                    <b id="res-name"></b><br><small id="res-user"></small>
                </div>
                <button onclick="sendInvite()" class="btn-main" style="width:auto; padding:5px 10px;">Ajouter</button>
            </div>
        </div>
        <hr>
        <h4 style="margin:10px 15px;">Mes Amis / Followers</h4>
        <div id="friends-list"></div>
    </div>

    <div id="tab-messages" class="hidden">
        <div style="text-align:center; margin-top:50px; color:gray;">💬 Vos messages apparaîtront ici</div>
    </div>

    <div id="tab-profile" class="hidden">
        <div class="profile-header">
            <img id="my-avatar" src="" style="width:90px; height:90px; border-radius:50%; border:3px solid var(--main);">
            <h2 id="my-name"></h2>
            <p id="my-username" style="color:var(--main); margin:0;"></p>
            <div class="stats">
                <div class="stat-box"><span class="stat-num" id="stat-friends">0</span>Amis</div>
                <div class="stat-box"><span class="stat-num" id="stat-followers">0</span>Followers</div>
                <div class="stat-box"><span class="stat-num" id="stat-following">0</span>Suivis</div>
            </div>
            <button class="btn-main" style="background:#ef4444; margin-top:20px;" onclick="logout()">Déconnexion</button>
        </div>
    </div>
</div>

<div class="bottom-nav hidden" id="bottom-bar">
    <button class="nav-item active" onclick="showTab('shop', this)">🏠<span>Shop</span></button>
    <button class="nav-item" onclick="showTab('social', this)">👥<span>Social</span></button>
    <button class="nav-item" onclick="showTab('messages', this)">💬<span>Chats</span></button>
    <button class="nav-item" onclick="showTab('profile', this)">👤<span>Profil</span></button>
</div>

<script>
    // Config Firebase
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let isLogin = true;
    let currentLang = 'fr';
    let currentUserData = null;

    // Traduction
    const i18n = {
        fr: { auth: "Connexion", toggle: "Créer un compte", cats: {all: "🏠 Tout", smartphone: "📱 Phones", clothing: "👕 Habits"} },
        ar: { auth: "تسجيل الدخول", toggle: "إنشاء حساب جديد", cats: {all: "🏠 الكل", smartphone: "📱 هواتف", clothing: "👕 ملابس"} }
    };

    // Wilayas
    const wList = ["01-Adrar", "16-Alger", "31-Oran", "22-Sidi Bel Abbès"]; // كملهم كامل
    wList.forEach(w => document.getElementById('reg-wilaya').innerHTML += `<option value="${w}">${w}</option>`);

    function changeLang(l) {
        currentLang = l;
        document.body.classList.toggle('rtl', l === 'ar');
        renderCats();
    }

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('reg-fields').classList.toggle('hidden', isLogin);
        document.getElementById('btn-auth').innerText = isLogin ? "Se connecter" : "S'inscrire";
    }

    function toggleShop() {
        document.getElementById('reg-shop').classList.toggle('hidden', document.getElementById('reg-role').value !== 'vendor');
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(isLogin) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        } else {
            const name = document.getElementById('reg-name').value;
            const username = document.getElementById('reg-user').value.startsWith('@') ? document.getElementById('reg-user').value : '@' + document.getElementById('reg-user').value;
            const phone = document.getElementById('reg-phone').value;
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await db.ref('users/' + res.user.uid).set({
                name, username, phone, 
                role: document.getElementById('reg-role').value,
                wilaya: document.getElementById('reg-wilaya').value,
                shopName: document.getElementById('reg-shop').value || '',
                avatar: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                friends: 0, followers: 0, following: 0, status: 'approved'
            });
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                currentUserData = snap.val();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('bottom-bar').classList.remove('hidden');
                
                // Update Profile UI
                document.getElementById('my-name').innerText = currentUserData.name;
                document.getElementById('my-username').innerText = currentUserData.username;
                document.getElementById('my-avatar').src = currentUserData.avatar;
                document.getElementById('stat-friends').innerText = currentUserData.friends || 0;
                renderCats(); loadProducts();
            });
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('bottom-bar').classList.add('hidden');
        }
    });

    function showTab(id, btn) {
        ["shop", "social", "messages", "profile"].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
        document.getElementById('tab-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // Social Logic
    let foundUserId = "";
    function findFriend() {
        const val = document.getElementById('friend-input').value;
        db.ref('users').once('value', snap => {
            let found = false;
            snap.forEach(child => {
                const u = child.val();
                if(u.username === val || u.phone === val) {
                    found = true; foundUserId = child.key;
                    document.getElementById('search-result').classList.remove('hidden');
                    document.getElementById('res-name').innerText = u.name;
                    document.getElementById('res-user').innerText = u.username;
                    document.getElementById('res-img').src = u.avatar;
                }
            });
            if(!found) alert("Utilisateur non trouvé!");
        });
    }

    function sendInvite() {
        alert("Invitation envoyée à " + foundUserId);
        // هنا تزيد كود حفظ الطلب في Firebase
    }

    function renderCats() {
        const box = document.getElementById('cat-list');
        const c = i18n[currentLang].cats;
        box.innerHTML = '';
        for(let k in c) box.innerHTML += `<button class="cat-btn" onclick="filterCat('${k}')">${c[k]}</button>`;
    }

    function loadProducts() {
        db.ref('products').on('value', snap => {
            const list = document.getElementById('product-list'); list.innerHTML = '';
            snap.forEach(child => {
                const p = child.val();
                list.innerHTML += `<div class="p-card"><img src="${p.img}"><h4>${p.name}</h4><b style="color:var(--main)">${p.price} DA</b></div>`;
            });
        });
    }

    function logout() { auth.signOut(); location.reload(); }
    changeLang('fr');
</script>
</body>
</html>
