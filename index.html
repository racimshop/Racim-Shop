<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACIM SHOP | Boutique Professional</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --main: #2563eb; --jumia: #f68b1e; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
        .hidden { display: none !important; }
        
        /* Header & Lang */
        nav { background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .lang-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        /* Categories Bar */
        .categories { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: white; white-space: nowrap; border-bottom: 1px solid #eee; }
        .cat-item { background: #f1f5f9; padding: 8px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .cat-item.active { background: var(--main); color: white; }

        /* Product Card */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .p-card { background: white; border-radius: 15px; padding: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; position: relative; }
        .p-card img { width: 100%; height: 120px; object-fit: contain; border-radius: 10px; }
        .p-card h4 { margin: 10px 0 5px; font-size: 14px; height: 35px; overflow: hidden; color: #334155; }
        .price-tag { color: var(--jumia); font-weight: bold; font-size: 17px; margin-bottom: 10px; display: block; }
        
        /* Buy Button */
        .btn-buy { background: var(--main); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-buy:hover { background: #1d4ed8; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; cursor: pointer; font-size: 12px; }
        .nav-item.active { color: var(--main); font-weight: bold; }

        /* Auth Card */
        .auth-card { background: white; margin: 20px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<nav>
    <span id="nav-logo">RACIM SHOP</span>
    <button class="lang-btn" onclick="toggleLang()">العربية / FR</button>
</nav>

<div id="auth-section" class="auth-card">
    <h2 id="auth-title" style="text-align:center;">Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <div id="register-fields" class="hidden">
        <input type="text" id="reg-name" placeholder="Nom Complet">
        <input type="text" id="reg-user" placeholder="Username (@)">
        <select id="reg-wilaya"></select>
    </div>
    <button class="btn-buy" onclick="handleAuth()" style="margin-top:10px;" id="auth-btn">Continuer</button>
    <p onclick="toggleAuth()" id="auth-toggle" style="text-align:center; color:var(--main); cursor:pointer; font-size:14px; margin-top:15px;">Créer un compte</p>
</div>

<div id="app-content" class="hidden">
    <div class="categories" id="cat-list">
        <div class="cat-item active" onclick="filterCat('All')">Tout</div>
        <div class="cat-item" onclick="filterCat('Phones')">Téléphones</div>
        <div class="cat-item" onclick="filterCat('Clothes')">Vêtements</div>
        <div class="cat-item" onclick="filterCat('Electronics')">Électronique</div>
    </div>

    <div id="tab-home" class="page">
        <div class="product-grid" id="product-list"></div>
    </div>

    <div id="tab-profile" class="page hidden">
        <div class="auth-card" style="text-align:center;">
            <div style="width:70px; height:70px; background:var(--main); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 15px; font-size:25px; font-weight:bold;" id="avatar">R</div>
            <h2 id="my-name"></h2>
            <p id="my-user" style="color:var(--main); font-weight:bold;"></p>
            <p id="my-wilaya" style="color:#64748b;"></p>
            <button onclick="auth.signOut()" style="background:#fff1f2; color:#e11d48; border:none; padding:10px 20px; border-radius:10px; margin-top:20px; cursor:pointer;">Déconnexion</button>
        </div>
    </div>
</div>

<div class="bottom-nav hidden" id="nav-bar">
    <div class="nav-item active" onclick="showTab('home', this)"><span style="font-size:20px;">🛒</span><span id="nav-shop">Boutique</span></div>
    <div class="nav-item" onclick="showTab('profile', this)"><span style="font-size:20px;">👤</span><span id="nav-profile">Profil</span></div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let isLogin = true, currentLang = 'fr';
    const translations = {
        fr: { shop: "Boutique", profile: "Profil", buy: "Acheter 🛒", login: "Connexion", create: "Créer un compte", confirm: "Un code a été envoyé" },
        ar: { shop: "المتجر", profile: "حسابي", buy: "شراء 🛒", login: "تسجيل الدخول", create: "إنشاء حساب", confirm: "تم إرسال الكود" }
    };

    function toggleLang() {
        currentLang = currentLang === 'fr' ? 'ar' : 'fr';
        document.getElementById('nav-shop').innerText = translations[currentLang].shop;
        document.getElementById('nav-profile').innerText = translations[currentLang].profile;
        document.body.style.direction = currentLang === 'ar' ? 'rtl' : 'ltr';
        loadProducts(); // لتحديث أزرار الشراء
    }

    // تعبئة الولايات
    const wilayas = ["16-Alger", "31-Oran", "22-Sidi Bel Abbès"]; // كملهم
    wilayas.forEach(w => document.getElementById('reg-wilaya').innerHTML += `<option value="${w}">${w}</option>`);

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('register-fields').classList.toggle('hidden', isLogin);
        document.getElementById('auth-title').innerText = isLogin ? translations[currentLang].login : translations[currentLang].create;
    }

    async function handleAuth() {
        const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
        if(isLogin) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        } else {
            const user = document.getElementById('reg-user').value.trim();
            const snap = await db.ref('users').orderByChild('username').equalTo(user).once('value');
            if(snap.exists()) return alert("Username déjà pris");
            
            // هنا تزيد كود الـ Email Verification كما في الكود السابق
            auth.createUserWithEmailAndPassword(email, pass).then(res => {
                db.ref('users/' + res.user.uid).set({
                    name: document.getElementById('reg-name').value,
                    username: user, email: email, wilaya: document.getElementById('reg-wilaya').value
                });
            });
        }
    }
