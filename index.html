<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racim Shop | المتجر الرسمي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --dark: #0f172a; --blue: #2563eb; --green: #10b981; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; text-align: center; padding-bottom: 50px; }
        nav { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; color: #f59e0b; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .hidden { display: none !important; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .card img { width: 100%; height: 180px; object-fit: contain; border-radius: 10px; }
        .qty-tag { color: #64748b; font-size: 0.9em; margin-bottom: 5px; display: block; }
        #cart-sidebar { position: fixed; left: 0; top: 0; width: 300px; height: 100%; background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.2); padding: 20px; z-index: 2000; overflow-y: auto; text-align: right; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Racim Shop 🛒</div>
    <div id="nav-info" class="hidden">
        <button onclick="toggleCart()" style="background:#f59e0b; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">السلة 🛒 <span id="cart-num">0</span></button>
        <button onclick="logout()" style="background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:8px; margin-right:10px;">خروج</button>
    </div>
</nav>

<div id="cart-sidebar" class="hidden">
    <h3>سلتي 🛒</h3>
    <div id="cart-items-list"></div>
    <hr>
    <h4>المجموع: <span id="cart-total">0</span> DA</h4>
    <button class="btn btn-green" onclick="sendOrder()">تأكيد الطلبية ✅</button>
    <button class="btn" style="background:#64748b; color:white; margin-top:10px;" onclick="toggleCart()">إغلاق</button>
</div>

<div id="auth-section">
    </div>

<div id="shop-section" class="hidden">
    <h1>مرحباً، <span id="user-display"></span>! 👋</h1>
    <div class="product-grid" id="p-grid"></div>
</div>

<script>
    // ... إعدادات Firebase ...
    const firebaseConfig = { /* معلوماتك هنا */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let cart = [];

    function loadProducts() {
        db.ref('products').on('value', snap => {
            const grid = document.getElementById('p-grid');
            grid.innerHTML = '';
            snap.forEach(child => {
                const p = child.val();
                const canBuy = p.qty > 0;
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img}">
                        <h3>${p.name}</h3>
                        <span class="qty-tag">${canBuy ? 'متوفر: ' + p.qty + ' حبة' : '<span style="color:red">نفدت الكمية</span>'}</span>
                        <p style="color:var(--blue); font-weight:bold;">${p.price} DA</p>
                        <button class="btn btn-blue" onclick="addToCart('${child.key}', '${p.name}', ${p.price}, ${p.qty})" ${!canBuy ? 'disabled style="background:#ccc"' : ''}>
                            ${canBuy ? 'إضافة للسلة 🛒' : 'غير متوفر'}
                        </button>
                    </div>`;
            });
        });
    }

    function addToCart(id, name, price, stock) {
        const inCart = cart.filter(i => i.id === id).length;
        if(inCart >= stock) return alert("مكاش كثر من هاد الكمية في الستوك!");
        cart.push({ id, name, price });
        updateCartUI();
    }

    function sendOrder() {
        if(cart.length === 0) return alert("سلتك فارغة!");
        // كود إرسال الطلبية مع إنقاص الكمية من الداتابيز
        cart.forEach(item => {
            db.ref('products/' + item.id + '/qty').transaction(currentQty => (currentQty || 0) - 1);
        });
        // إرسال معلومات الطلبية للآدمن (كما في الكود السابق)
        // ...
    }
    // ... باقي الدوال (Login/UI) ...
</script>
</body>
</html>
