<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racim Shop | المتجر الرسمي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --dark: #0f172a; --blue: #2563eb; --green: #10b981; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; text-align: center; padding-bottom: 50px; }
        nav { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; color: #f59e0b; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .hidden { display: none !important; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: contain; }
        
        /* سلة المشتريات */
        #cart-sidebar { position: fixed; left: 0; top: 0; width: 300px; height: 100%; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.2); padding: 20px; z-index: 2000; overflow-y: auto; text-align: right; }
        .cart-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .cart-count { background: #ef4444; color: white; padding: 2px 8px; border-radius: 50%; font-size: 12px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Racim Shop 🛒</div>
    <div id="nav-info" class="hidden">
        <button onclick="toggleCart()" style="background:#f59e0b; color:white; border:none; padding:8px 15px; border-radius:8px; margin-left:10px;">السلة 🛒 <span id="cart-num" class="cart-count">0</span></button>
        <button onclick="logout()" style="background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:8px;">خروج</button>
    </div>
</nav>

<div id="cart-sidebar" class="hidden">
    <h3>سلة المشتريات 🛒</h3>
    <div id="cart-items-list"></div>
    <hr>
    <h4>المجموع: <span id="cart-total">0</span> DA</h4>
    <button class="btn btn-green" onclick="sendOrder()">إرسال الطلب للـ Admin ✅</button>
    <button class="btn" style="background:#64748b; color:white; margin-top:10px;" onclick="toggleCart()">إغلاق</button>
</div>

<div id="auth-section">
    <div id="login-box" class="container">
        <h2>تسجيل الدخول</h2>
        <input type="email" id="l-email" placeholder="البريد الإلكتروني">
        <input type="password" id="l-pass" placeholder="كلمة السر">
        <button class="btn btn-blue" onclick="signIn()">دخول للمتجر</button>
        <p>ما عندكش حساب؟ <a href="#" onclick="toggleUI(true)">سجل الآن</a></p>
    </div>

    <div id="reg-box" class="container hidden">
        <h2>إنشاء حساب</h2>
        <input type="text" id="r-name" placeholder="الاسم الكامل">
        <input type="email" id="r-email" placeholder="البريد الإلكتروني">
        <input type="password" id="r-pass" placeholder="كلمة السر">
        <button class="btn btn-green" onclick="signUp()">فتح حساب</button>
        <p>عندك حساب؟ <a href="#" onclick="toggleUI(false)">سجل دخول</a></p>
    </div>
</div>

<div id="shop-section" class="hidden">
    <h1>مرحباً بك، <span id="user-display"></span>! 👋</h1>
    <div class="product-grid" id="p-grid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs",
        authDomain: "racimshop-60fb0.firebaseapp.com",
        projectId: "racimshop-60fb0",
        storageBucket: "racimshop-60fb0.firebasestorage.app",
        messagingSenderId: "1049057013675",
        appId: "1:1049057013675:web:b0cf22da97e39e0e4b6cee",
        databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let cart = [];
    let currentUserName = "";

    function toggleUI(isReg) {
        document.getElementById('reg-box').classList.toggle('hidden', !isReg);
        document.getElementById('login-box').classList.toggle('hidden', isReg);
    }

    // 1. تسجيل الحساب (Valide تلقائياً)
    function signUp() {
        const email = document.getElementById('r-email').value;
        const pass = document.getElementById('r-pass').value;
        const name = document.getElementById('r-name').value;
        if(!name || !email || !pass) return alert("عمر كلش يا رسيم!");

        auth.createUserWithEmailAndPassword(email, pass).then(res => {
            db.ref('users/' + res.user.uid).set({
                uid: res.user.uid, name: name, email: email, status: 'valide', joinDate: new Date().toLocaleDateString()
            }).then(() => alert("مبروك الحساب واجد!"));
        }).catch(err => alert(err.message));
    }

    function signIn() {
        const email = document.getElementById('l-email').value;
        const pass = document.getElementById('l-pass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).once('value').then(snap => {
                const userData = snap.val();
                currentUserName = userData.name;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('shop-section').classList.remove('hidden');
                document.getElementById('nav-info').classList.remove('hidden');
                document.getElementById('user-display').innerText = userData.name;
                loadProducts();
            });
        }
    });

    // 2. سلة المشتريات
    function loadProducts() {
        db.ref('products').on('value', (snapshot) => {
            const grid = document.getElementById('p-grid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const p = child.val();
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img}">
                        <h3>${p.name}</h3>
                        <p class="price">${p.price} DA</p>
                        <button class="btn btn-blue" onclick="addToCart('${p.name}', ${p.price})">إضافة للسلة 🛒</button>
                    </div>`;
            });
        });
    }

    function addToCart(name, price) {
        cart.push({ name, price });
        updateCartUI();
    }

    function updateCartUI() {
        document.getElementById('cart-num').innerText = cart.length;
        const list = document.getElementById('cart-items-list');
        const totalDisp = document.getElementById('cart-total');
        list.innerHTML = '';
        let total = 0;
        cart.forEach((item, index) => {
            total += parseInt(item.price);
            list.innerHTML += `<div class="cart-item"><span>${item.name}</span> <b>${item.price} DA</b></div>`;
        });
        totalDisp.innerText = total;
    }

    function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('hidden'); }

    // 3. إرسال الطلبية للـ Admin
    function sendOrder() {
        if(cart.length === 0) return alert("السلة فارغة!");
        const orderData = {
            customer: currentUserName,
            items: cart,
            total: document.getElementById('cart-total').innerText,
            date: new Date().toLocaleString()
        };
        db.ref('orders').push(orderData).then(() => {
            alert("تم إرسال طلبيتك لرسيم بنجاح! ✅");
            cart = [];
            updateCartUI();
            toggleCart();
        });
    }
</script>
</body>
</html>
