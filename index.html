<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racim Marketplace | Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #2563eb; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        nav { background: var(--dark); color: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .profile-img { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid var(--main); }
        
        /* Categories Style */
        .categories { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: white; white-space: nowrap; border-bottom: 1px solid #e2e8f0; }
        .cat-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 500; transition: 0.3s; }
        .cat-btn.active { background: var(--main); color: white; border-color: var(--main); }

        /* Products Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 140px; object-fit: contain; margin-bottom: 10px; }
        .card h4 { margin: 10px 0 5px; font-size: 15px; }
        .price { color: var(--main); font-weight: bold; }
        
        .auth-card { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-primary { background: var(--main); color: white; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .rtl { direction: rtl; }

        /* Modal Profile */
        #profile-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; width: 320px; padding: 25px; border-radius: 20px; text-align: center; }
        .large-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid var(--main); }
    </style>
</head>
<body>

<nav>
    <div class="logo">Racim Shop</div>
    <div style="display:flex; align-items:center; gap:10px;">
        <select id="lang-select" onchange="changeLang(this.value)" style="width:auto; padding:5px;">
            <option value="fr">FR 🇫🇷</option>
            <option value="ar">AR 🇩🇿</option>
            <option value="en">EN 🇺🇸</option>
        </select>
        <div id="user-nav" class="hidden">
            <img src="" id="nav-avatar" class="profile-img" onclick="openProfile()">
        </div>
    </div>
</nav>

<div id="auth-screen" class="auth-card">
    <h2 id="t-auth-title">Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <div id="reg-box" class="hidden">
        <input type="text" id="name" placeholder="Full Name">
        <select id="wilaya"></select>
    </div>
    <button class="btn-primary" onclick="handleAuth()" id="btn-auth">Login</button>
    <p id="t-toggle" onclick="toggleAuth()" style="color:var(--main); cursor:pointer;">No account? Create one</p>
</div>

<div id="main-content" class="hidden">
    <div class="categories" id="cat-list">
        </div>

    <div class="grid" id="product-grid"></div>
</div>

<div id="profile-modal">
    <div class="modal-content">
        <img src="" id="modal-avatar" class="large-avatar">
        <input type="file" id="avatar-input" accept="image/*" style="font-size:11px;">
        <button class="btn-primary" onclick="updateAvatar()">Update Photo</button>
        <p><b id="t-p-name">Nom:</b> <span id="p-name"></span></p>
        <button class="btn-primary" style="background:#ef4444;" onclick="logout()">Logout</button>
        <button class="btn-primary" style="background:#64748b;" onclick="closeProfile()">Close</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // --- الترجمة ---
    const i18n = {
        fr: { 
            authTitle: "Connexion", toggle: "Pas de compte? Créer un", login: "Se connecter", signup: "S'inscrire",
            cats: { all: "Tout", smartphone: "Téléphones", clothing: "Vêtements", shoes: "Chaussures", electro: "Électro" }
        },
        ar: { 
            authTitle: "تسجيل الدخول", toggle: "ليس لديك حساب؟ سجل هنا", login: "دخول", signup: "إنشاء حساب",
            cats: { all: "الكل", smartphone: "هواتف", clothing: "ملابس", shoes: "أحذية", electro: "كهرومنزلي" }
        },
        en: { 
            authTitle: "Login", toggle: "No account? Register", login: "Login", signup: "Sign Up",
            cats: { all: "All", smartphone: "Phones", clothing: "Clothing", shoes: "Shoes", electro: "Electronics" }
        }
    };

    let currentLang = 'fr';
    let currentCat = 'all';
    let isLoginMode = true;

    // ملء الولايات
    const wilayas = ["01-Adrar", "16-Alger", "31-Oran"]; // اختصرتها لك، زيد الباقي
    wilayas.forEach(w => document.getElementById('wilaya').innerHTML += `<option value="${w}">${w}</option>`);

    function changeLang(l) {
        currentLang = l;
        const t = i18n[l];
        document.body.classList.toggle('rtl', l === 'ar');
        document.getElementById('t-auth-title').innerText = t.authTitle;
        document.getElementById('t-toggle').innerText = t.toggle;
        document.getElementById('btn-auth').innerText = isLoginMode ? t.login : t.signup;
        renderCategories();
        loadProducts(); // إعادة تحميل السلع لتحديث "المحل" وغيره
    }

    function renderCategories() {
        const catList = document.getElementById('cat-list');
        const c = i18n[currentLang].cats;
        catList.innerHTML = '';
        for (let key in c) {
            catList.innerHTML += `<button class="cat-btn ${currentCat === key ? 'active' : ''}" onclick="filterCat('${key}')">${c[key]}</button>`;
        }
    }

    function filterCat(key) {
        currentCat = key;
        renderCategories();
        loadProducts();
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try {
            if(isLoginMode) await auth.signInWithEmailAndPassword(email, pass);
            else {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/' + res.user.uid).set({
                    name: document.getElementById('name').value,
                    wilaya: document.getElementById('wilaya').value,
                    role: 'buyer', avatar: "https://cdn-icons-png.flaticon.com/512/149/149071.png"
                });
            }
        } catch(e) { alert(e.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const u = snap.val();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-nav').classList.remove('hidden');
                document.getElementById('nav-avatar').src = u.avatar;
                document.getElementById('modal-avatar').src = u.avatar;
                document.getElementById('p-name').innerText = u.name;
                renderCategories();
                loadProducts();
            });
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
        }
    });

    function loadProducts() {
        db.ref('products').on('value', snap => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            snap.forEach(c => {
                const p = c.val();
                if(currentCat !== 'all' && p.cat !== currentCat) return;
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img || 'https://via.placeholder.com/150'}">
                        <h4>${p.name}</h4>
                        <div class="price">${p.price} DA</div>
                        <small style="color:gray">${currentLang === 'ar' ? 'المحل' : 'Boutique'}: ${p.shopName || 'Admin'}</small>
                    </div>`;
            });
        });
    }

    function toggleAuth() { isLoginMode = !isLoginMode; document.getElementById('reg-box').classList.toggle('hidden', isLoginMode); changeLang(currentLang); }
    function openProfile() { document.getElementById('profile-modal').style.display = 'flex'; }
    function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
    function logout() { auth.signOut(); location.reload(); }

    async function updateAvatar() {
        const file = document.getElementById('avatar-input').files[0];
        if(!file) return;
        const fd = new FormData(); fd.append("image", file);
        const res = await fetch("https://api.imgbb.com/1/upload?key=6df707297960710609a6390176846175", {method:"POST", body:fd});
        const d = await res.json();
        if(d.success) db.ref('users/' + auth.currentUser.uid).update({ avatar: d.data.url });
    }

    changeLang('fr'); // البداية بالفرنسية
</script>
</body>
</html>
