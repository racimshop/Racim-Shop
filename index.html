<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYSHOES | Sneakers Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #000; --accent: #2563eb; --gray: #f9f9f9; }
        body { font-family: 'Inter', sans-serif; background: #fff; margin: 0; padding-bottom: 80px; }
        .hidden { display: none !important; }

        /* Header MYSHOES */
        nav { background: #fff; border-bottom: 1px solid #eee; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        /* Categories */
        .categories { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: #fff; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-item { background: var(--gray); padding: 8px 20px; border-radius: 30px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; border: 1px solid transparent; }
        .cat-item.active { background: var(--primary); color: #fff; }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .p-card { background: #fff; transition: 0.3s; }
        .p-img-box { background: var(--gray); border-radius: 15px; padding: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-card img { width: 100%; height: 140px; object-fit: contain; transform: rotate(-10deg); transition: 0.3s; }
        .p-card:hover img { transform: rotate(0deg) scale(1.1); }
        
        .p-info { padding: 12px 0; }
        .p-info h4 { margin: 0; font-size: 14px; font-weight: 700; color: #111; text-transform: uppercase; height: 35px; overflow: hidden; }
        .p-price { font-size: 15px; font-weight: 900; color: var(--primary); margin: 4px 0; }

        .btn-buy { background: var(--primary); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px; margin-top: 10px; letter-spacing: 1px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #eee; height: 65px; box-shadow: 0 -5px 15px rgba(0,0,0,0.03); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 10px; margin-top: 4px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="logo">MY<span>SHOES</span></div>
    <div style="font-size: 11px; font-weight: 900; border: 1px solid #000; padding: 4px 10px; border-radius: 5px;">DZ STORE</div>
</nav>

<div id="app-content">
    <div class="categories">
        <div class="cat-item active" onclick="filterCat('All')">TOUT</div>
        <div class="cat-item" onclick="filterCat('Sneakers')">SNEAKERS</div>
        <div class="cat-item" onclick="filterCat('Classic')">CLASSIC</div>
        <div class="cat-item" onclick="filterCat('Sport')">SPORT</div>
    </div>

    <div class="product-grid" id="product-list">
        </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active">🏠 <span>SHOP</span></div>
    <div class="nav-item">👤 <span>PROFIL</span></div>
</div>

<script>
    // Configuration Firebase
    const firebaseConfig = { apiKey: "AIzaSyBYNbsg0khZx3TdK2GyA3u4FpHOWnfliIs", databaseURL: "https://racimshop-60fb0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadProducts(filter = 'All') {
        db.ref('products').on('value', snap => {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            snap.forEach(c => {
                const p = c.val();
                if(filter === 'All' || p.category === filter) {
                    list.innerHTML += `
                    <div class="p-card">
                        <div class="p-img-box">
                            <img src="${p.img || p.image || ''}">
                        </div>
                        <div class="p-info">
                            <h4>${p.name || p.title}</h4>
                            <div class="p-price">${p.price} DA</div>
                            <button class="btn-buy" onclick="orderShoe('${c.key}', '${p.name||p.title}', '${p.price}')">COMMANDER</button>
                        </div>
                    </div>`;
                }
            });
        });
    }

    function orderShoe(id, name, price) {
        const size = prompt("Pointure (Size) ?");
        const phone = prompt("Numéro de Téléphone :");
        if(size && phone) {
            db.ref('orders').push({
                product: name,
                price: price,
                size: size,
                phone: phone,
                date: new Date().toLocaleString(),
                store: "MYSHOES"
            }).then(() => alert("✅ Commande envoyée à MYSHOES !"));
        }
    }

    loadProducts();
</script>
</body>
</html>
